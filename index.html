<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movs2nighT | The Future of Streaming</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030305;
            --surface: rgba(20, 20, 25, 0.6);
            --surface-border: rgba(255, 255, 255, 0.08);
            --primary: #00f3ff;
            --secondary: #bc13fe;
            --text-main: #ffffff;
            --text-muted: #8892b0;
            --glass-blur: blur(16px);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Cairo', sans-serif;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .en-text { font-family: 'Space Grotesk', sans-serif; direction: ltr; display: inline-block; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--surface-border); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Ambient Background */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; overflow: hidden; background: var(--bg);
        }
        .ambient-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(var(--surface-border) 1px, transparent 1px),
                              linear-gradient(90deg, var(--surface-border) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.2;
            transform: perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px);
            animation: gridMove 20s linear infinite;
        }
        .orb {
            position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
            animation: float 10s infinite alternate ease-in-out;
        }
        .orb-1 { width: 400px; height: 400px; background: var(--primary); top: -100px; right: -100px; }
        .orb-2 { width: 500px; height: 500px; background: var(--secondary); bottom: -200px; left: -100px; animation-delay: -5s; }

        @keyframes float { 0% { transform: translate(0, 0); } 100% { transform: translate(50px, 50px); } }
        @keyframes gridMove { 0% { background-position: 0 0; } 100% { background-position: 0 40px; } }

        /* Glassmorphism Utilities */
        .glass {
            background: var(--surface);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
        }

        /* Navbar */
        .navbar {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 1200px; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 24px; transition: all 0.3s ease;
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.5rem;
            color: #fff; text-decoration: none; text-transform: uppercase; letter-spacing: 2px;
            text-shadow: 0 0 10px var(--primary);
        }
        .search-container { position: relative; }
        .search-input {
            background: rgba(0,0,0,0.3); border: 1px solid var(--surface-border);
            color: #fff; padding: 10px 20px; border-radius: 999px; font-family: 'Cairo', sans-serif;
            width: 200px; transition: all 0.3s ease; outline: none;
        }
        .search-input:focus { width: 300px; border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 243, 255, 0.3); }

        /* Main Container */
        .container { max-width: 1400px; margin: 0 auto; padding: 120px 20px 40px; }

        /* Hero Section */
        .hero {
            position: relative; width: 100%; height: 60vh; min-height: 400px;
            border-radius: 32px; overflow: hidden; margin-bottom: 40px;
            display: flex; align-items: flex-end; padding: 40px;
            border: 1px solid var(--surface-border);
        }
        .hero-bg {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;
            mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0) 100%);
            transition: transform 0.5s ease;
        }
        .hero:hover .hero-bg { transform: scale(1.05); }
        .hero-content { position: relative; z-index: 1; max-width: 600px; }
        .hero-title { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; text-shadow: 0 4px 20px rgba(0,0,0,0.8); line-height: 1.1; }
        .hero-meta { display: flex; gap: 15px; margin-bottom: 20px; font-family: 'Space Grotesk', sans-serif; color: var(--primary); font-weight: 600; }
        
        /* Buttons */
        .btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: #fff; border: none; padding: 12px 32px; border-radius: 999px;
            font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem;
            cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0, 243, 255, 0.6); }

        /* Grid System */
        .section-title {
            font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700;
            margin: 40px 0 20px; display: flex; align-items: center; gap: 10px;
        }
        .section-title::before { content: ''; display: block; width: 4px; height: 24px; background: var(--primary); border-radius: 4px; box-shadow: 0 0 10px var(--primary); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 24px; }
        
        /* Futuristic Cards */
        .card {
            position: relative; border-radius: 16px; overflow: hidden; cursor: pointer;
            aspect-ratio: 2/3; background: #111;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .card::before {
            content: ''; position: absolute; inset: 0; border-radius: 16px; padding: 2px;
            background: linear-gradient(45deg, transparent, transparent, var(--primary), var(--secondary));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor; mask-composite: exclude;
            opacity: 0; transition: opacity 0.4s ease; z-index: 2;
        }
        .card img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; opacity: 0.8; }
        .card:hover { transform: translateY(-10px) scale(1.02); z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.8); }
        .card:hover::before { opacity: 1; }
        .card:hover img { transform: scale(1.1); opacity: 1; filter: brightness(1.1); }
        .card-info {
            position: absolute; bottom: 0; left: 0; width: 100%; padding: 20px 15px 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            transform: translateY(20px); opacity: 0; transition: all 0.3s ease; z-index: 3;
        }
        .card:hover .card-info { transform: translateY(0); opacity: 1; }
        .card-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
        .card-year { color: var(--primary); font-size: 0.8rem; font-weight: 600; }

        /* Bento Box Details View */
        #details-view { display: none; }
        .details-backdrop {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover;
            opacity: 0.15; z-index: -1; filter: blur(10px);
        }
        .bento-grid {
            display: grid; grid-template-columns: 300px 1fr; gap: 24px; margin-top: 20px;
        }
        .bento-poster { width: 100%; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid var(--surface-border); }
        .bento-main { display: flex; flex-direction: column; gap: 24px; }
        .bento-header { padding: 40px; display: flex; flex-direction: column; justify-content: center; }
        .bento-title { font-size: 4rem; font-weight: 800; line-height: 1; margin-bottom: 15px; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .bento-meta { display: flex; gap: 20px; font-family: 'Space Grotesk', sans-serif; font-size: 1.1rem; color: var(--text-muted); margin-bottom: 30px; }
        .bento-meta span { display: flex; align-items: center; gap: 5px; }
        .bento-meta span.rating { color: #ffd700; }
        
        .bento-story { padding: 30px; font-size: 1.2rem; line-height: 1.8; color: #e2e8f0; }
        .bento-story h3 { color: var(--primary); margin-bottom: 15px; font-size: 1.5rem; }
        
        .genres { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .genre-tag {
            background: rgba(255,255,255,0.05); border: 1px solid var(--surface-border);
            padding: 6px 16px; border-radius: 999px; font-size: 0.9rem;
            transition: all 0.3s ease;
        }
        .genre-tag:hover { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }

        /* Cinematic Player View */
        #player-view {
            display: none; position: fixed; inset: 0; background: #000; z-index: 1000; flex-direction: column;
        }
        .player-header {
            padding: 20px 30px; display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); position: absolute; top: 0; width: 100%; z-index: 10;
        }
        .back-btn {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s ease; font-size: 1.2rem; backdrop-filter: blur(5px);
        }
        .back-btn:hover { background: var(--primary); color: #000; border-color: var(--primary); transform: scale(1.1); }
        .player-title { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.2rem; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        
        .player-layout { display: flex; width: 100%; height: 100vh; padding-top: 80px; }
        .iframe-wrapper { flex: 1; position: relative; background: #000; }
        .iframe-wrapper iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
        
        .tv-sidebar {
            width: 350px; background: rgba(10,10,15,0.95); border-right: 1px solid var(--surface-border);
            display: flex; flex-direction: column; backdrop-filter: blur(20px);
        }
        .season-picker { padding: 20px; border-bottom: 1px solid var(--surface-border); }
        .season-picker select {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.05); color: #fff;
            border: 1px solid var(--surface-border); border-radius: 12px; font-family: 'Space Grotesk', sans-serif;
            outline: none; cursor: pointer; transition: all 0.3s ease;
        }
        .season-picker select:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,243,255,0.2); }
        .season-picker select option { background: #111; }
        
        .episodes-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 5px; }
        .episode-btn {
            width: 100%; text-align: left; padding: 15px; background: transparent; border: 1px solid transparent;
            color: var(--text-muted); cursor: pointer; border-radius: 12px; display: flex; align-items: center; gap: 15px;
            transition: all 0.2s ease; font-family: 'Space Grotesk', sans-serif;
        }
        .episode-btn:hover { background: rgba(255,255,255,0.03); color: #fff; }
        .episode-btn.active {
            background: rgba(0, 243, 255, 0.1); color: var(--primary); border-color: rgba(0, 243, 255, 0.3);
            box-shadow: inset 0 0 20px rgba(0, 243, 255, 0.05);
        }
        .ep-num { font-size: 1.2rem; font-weight: 700; opacity: 0.5; width: 30px; }
        .episode-btn.active .ep-num { opacity: 1; text-shadow: 0 0 10px var(--primary); }

        /* Loader */
        .loader-container {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease;
        }
        .cyber-loader {
            width: 100px; height: 100px; border: 3px solid transparent; border-top-color: var(--primary);
            border-bottom-color: var(--secondary); border-radius: 50%; animation: spin 1.5s linear infinite;
            position: relative;
        }
        .cyber-loader::before {
            content: ''; position: absolute; inset: 10px; border: 3px solid transparent;
            border-left-color: var(--primary); border-right-color: var(--secondary); border-radius: 50%;
            animation: spin 1s linear infinite reverse;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .hidden { display: none !important; }

        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: 1fr; }
            .bento-poster { max-width: 300px; margin: 0 auto; }
            .bento-title { font-size: 2.5rem; text-align: center; }
            .bento-meta { justify-content: center; }
            .bento-header { align-items: center; text-align: center; padding: 20px; }
            .player-layout { flex-direction: column; }
            .tv-sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid var(--surface-border); }
        }
    </style>
</head>
<body>

    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-grid"></div>
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <!-- Initial Loader -->
    <div id="main-loader" class="loader-container">
        <div class="cyber-loader"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar glass">
        <a href="#" class="logo" onclick="showHome()">Movs2nighT</a>
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search the matrix..." onkeypress="handleSearch(event)" dir="ltr">
        </div>
    </nav>

    <!-- Home View -->
    <div id="home-view" class="container">
        <div id="hero-container"></div>
        
        <h2 class="section-title en-text">Trending Movies</h2>
        <div id="movies-grid" class="grid"></div>
        
        <h2 class="section-title en-text" style="margin-top: 60px;">Trending TV Shows</h2>
        <div id="shows-grid" class="grid"></div>
    </div>

    <!-- Details View -->
    <div id="details-view" class="container">
        <img id="details-backdrop" class="details-backdrop" src="" alt="">
        <div class="bento-grid">
            <img id="details-poster" class="bento-poster" src="" alt="">
            <div class="bento-main">
                <div class="glass bento-header">
                    <h1 id="details-title" class="bento-title en-text"></h1>
                    <div id="details-meta" class="bento-meta"></div>
                    <div>
                        <button class="btn" onclick="openPlayer()">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <span class="en-text">Initialize Stream</span>
                        </button>
                    </div>
                    <div id="details-genres" class="genres"></div>
                </div>
                <div class="glass bento-story">
                    <h3>ملف القصة</h3>
                    <p id="details-story"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- Player View -->
    <div id="player-view">
        <div class="player-header">
            <button class="back-btn" onclick="closePlayer()">✕</button>
            <span id="player-title" class="player-title en-text"></span>
            <div style="width: 40px;"></div> <!-- Spacer for centering -->
        </div>
        <div class="player-layout">
            <div class="iframe-wrapper">
                <iframe id="video-iframe" src="" allowfullscreen></iframe>
            </div>
            <div id="tv-sidebar" class="tv-sidebar hidden">
                <div class="season-picker">
                    <select id="season-selector" class="en-text" onchange="changeSeason(this.value)"></select>
                </div>
                <div id="episodes-list" class="episodes-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_KEY = 'c4bf0cb03e29e3fe72e44c3f2135b55a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        let currentMedia = null;
        let currentSeason = 1;
        let currentEpisode = 1;

        async function fetchTrending(type) {
            const res = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${API_KEY}`);
            const data = await res.json();
            return data.results;
        }

        function createCard(item, type) {
            const title = item.title || item.name || item.original_title || item.original_name;
            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
            
            return `
                <div class="card" onclick="showDetails(${item.id}, '${type}')">
                    <img src="${poster}" alt="${title}" loading="lazy">
                    <div class="card-info">
                        <div class="card-title en-text" style="display:block; text-align:left;">${title}</div>
                        <div class="card-year en-text" style="display:block; text-align:left;">${year} • ⭐ ${item.vote_average.toFixed(1)}</div>
                    </div>
                </div>
            `;
        }

        function renderHero(item, type) {
            const title = item.title || item.name || item.original_title || item.original_name;
            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            const backdrop = item.backdrop_path ? `https://image.tmdb.org/t/p/original${item.backdrop_path}` : '';
            const overview = item.overview ? item.overview.substring(0, 150) + '...' : '';

            return `
                <div class="hero glass">
                    <img src="${backdrop}" class="hero-bg" alt="Hero">
                    <div class="hero-content">
                        <div class="hero-meta">
                            <span>${type.toUpperCase()}</span>
                            <span>•</span>
                            <span>${year}</span>
                            <span>•</span>
                            <span style="color: #ffd700;">⭐ ${item.vote_average.toFixed(1)}</span>
                        </div>
                        <h1 class="hero-title en-text" style="display:block; text-align:left;">${title}</h1>
                        <p class="en-text" style="display:block; text-align:left; margin-bottom: 20px; color: #ccc; font-size: 1.1rem; line-height: 1.5;">${overview}</p>
                        <button class="btn" onclick="showDetails(${item.id}, '${type}')">
                            <span class="en-text">Access Data</span>
                        </button>
                    </div>
                </div>
            `;
        }

        async function initHome() {
            try {
                const movies = await fetchTrending('movie');
                const shows = await fetchTrending('tv');
                
                // Use the top trending movie as the hero
                if(movies.length > 0) {
                    document.getElementById('hero-container').innerHTML = renderHero(movies[0], 'movie');
                }

                document.getElementById('movies-grid').innerHTML = movies.slice(1).map(m => createCard(m, 'movie')).join('');
                document.getElementById('shows-grid').innerHTML = shows.map(s => createCard(s, 'tv')).join('');
            } catch (error) {
                console.error("Error loading data:", error);
            } finally {
                setTimeout(() => {
                    document.getElementById('main-loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('main-loader').style.display = 'none', 500);
                }, 800);
            }
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) {
                    document.getElementById('hero-container').style.display = 'block';
                    return initHome();
                }
                
                document.getElementById('main-loader').style.display = 'flex';
                document.getElementById('main-loader').style.opacity = '1';

                const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
                const data = await res.json();
                const results = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
                
                document.getElementById('hero-container').style.display = 'none';
                document.getElementById('home-view').innerHTML = `
                    <h2 class="section-title en-text">Search Results: ${query}</h2>
                    <div class="grid">${results.map(r => createCard(r, r.media_type)).join('')}</div>
                `;
                showHome();

                document.getElementById('main-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('main-loader').style.display = 'none', 500);
            }
        }

        async function showDetails(id, type) {
            document.getElementById('main-loader').style.display = 'flex';
            document.getElementById('main-loader').style.opacity = '1';

            document.getElementById('home-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            window.scrollTo(0, 0);
            
            try {
                const [enRes, arRes] = await Promise.all([
                    fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=en-US`),
                    fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=ar-SA`)
                ]);
                
                const en = await enRes.json();
                const ar = await arRes.json();
                
                currentMedia = { ...en, type };
                
                const title = en.title || en.name || en.original_title || en.original_name;
                const year = (en.release_date || en.first_air_date || '').split('-')[0];
                const story = ar.overview || en.overview || 'لا توجد قصة متاحة في قاعدة البيانات.';
                const genres = (ar.genres && ar.genres.length > 0) ? ar.genres : en.genres;
                
                document.getElementById('details-backdrop').src = en.backdrop_path ? `https://image.tmdb.org/t/p/original${en.backdrop_path}` : '';
                document.getElementById('details-poster').src = en.poster_path ? `https://image.tmdb.org/t/p/w500${en.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
                document.getElementById('details-title').innerText = title;
                document.getElementById('details-meta').innerHTML = `
                    <span class="en-text">${year}</span>
                    <span class="en-text rating">⭐ ${en.vote_average.toFixed(1)}</span>
                    <span class="en-text" style="border: 1px solid var(--surface-border); padding: 2px 8px; border-radius: 4px;">${type.toUpperCase()}</span>
                `;
                document.getElementById('details-story').innerText = story;
                document.getElementById('details-genres').innerHTML = genres.map(g => `<span class="genre-tag">${g.name}</span>`).join('');
            } catch (error) {
                console.error("Error loading details:", error);
            } finally {
                document.getElementById('main-loader').style.opacity = '0';
                setTimeout(() => document.getElementById('main-loader').style.display = 'none', 500);
            }
        }

        function showHome() {
            document.getElementById('details-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
        }

        async function openPlayer() {
            if (!currentMedia) return;
            
            document.getElementById('details-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'flex';
            
            const title = currentMedia.title || currentMedia.name;
            document.getElementById('player-title').innerText = title;
            
            if (currentMedia.type === 'movie') {
                document.getElementById('tv-sidebar').classList.add('hidden');
                document.getElementById('video-iframe').src = `https://vsembed.ru/embed/movie?tmdb=${currentMedia.id}&ds_lang=ar`;
            } else {
                document.getElementById('tv-sidebar').classList.remove('hidden');
                
                const seasons = currentMedia.seasons.filter(s => s.season_number > 0);
                document.getElementById('season-selector').innerHTML = seasons.map(s => 
                    `<option value="${s.season_number}">Season ${s.season_number}</option>`
                ).join('');
                
                changeSeason(seasons[0].season_number);
            }
        }

        function closePlayer() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('video-iframe').src = '';
            document.getElementById('details-view').style.display = 'block';
        }

        async function changeSeason(seasonNum) {
            currentSeason = seasonNum;
            const res = await fetch(`${BASE_URL}/tv/${currentMedia.id}/season/${seasonNum}?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            
            document.getElementById('episodes-list').innerHTML = data.episodes.map(ep => `
                <button class="episode-btn en-text ${ep.episode_number === 1 ? 'active' : ''}" onclick="changeEpisode(${ep.episode_number}, this)">
                    <span class="ep-num">${ep.episode_number}</span>
                    <span style="flex: 1; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">${ep.name}</span>
                </button>
            `).join('');
            
            changeEpisode(1, document.querySelector('.episode-btn'));
        }

        function changeEpisode(epNum, btnElement) {
            currentEpisode = epNum;
            
            document.querySelectorAll('.episode-btn').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            document.getElementById('video-iframe').src = `https://vsembed.ru/embed/tv?tmdb=${currentMedia.id}&season=${currentSeason}&episode=${currentEpisode}&ds_lang=ar`;
            
            const title = currentMedia.title || currentMedia.name;
            document.getElementById('player-title').innerText = `${title} - S${currentSeason} E${currentEpisode}`;
        }

        // Initialize
        initHome();
    </script>
</body>
</html>
