<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movs2nighT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
:root {
  --primary: #e50914;
  --primary-hover: #f40612;
  --bg-dark: #0a0a0a;
  --bg-card: #141414;
  --bg-header: rgba(10,10,10,0.95);
  --text-primary: #ffffff;
  --text-secondary: #a0a0a0;
  --text-muted: #666;
  --border: #222;
  --accent: #e50914;
  --gradient: linear-gradient(135deg, #e50914 0%, #b20710 100%);
  --shadow: 0 8px 32px rgba(0,0,0,0.6);
  --radius: 8px;
  --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Poppins', sans-serif;
  background: var(--bg-dark);
  color: var(--text-primary);
  line-height: 1.6;
  overflow-x: hidden;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-dark); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--primary-hover); }

/* HEADER */
.header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 1000;
  background: var(--bg-header);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  transition: var(--transition);
}

.header.scrolled {
  box-shadow: 0 4px 30px rgba(0,0,0,0.5);
}

.header-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px;
  height: 70px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex-shrink: 0;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--gradient);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 900;
  color: white;
}

.logo-text {
  font-size: 22px;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: -0.5px;
}

.nav {
  display: flex;
  align-items: center;
  gap: 6px;
}

.nav-link {
  padding: 8px 16px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  border-radius: 6px;
  transition: var(--transition);
  cursor: pointer;
  border: none;
  background: none;
}

.nav-link:hover, .nav-link.active {
  color: var(--text-primary);
  background: rgba(255,255,255,0.08);
}

.nav-link.active {
  color: var(--primary);
}

.search-container {
  position: relative;
  flex-shrink: 0;
}

.search-toggle {
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.search-toggle:hover {
  background: rgba(255,255,255,0.15);
  color: var(--text-primary);
}

.search-box {
  position: absolute;
  top: 55px;
  right: 0;
  width: 380px;
  max-width: calc(100vw - 40px);
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 16px;
  box-shadow: var(--shadow);
  display: none;
  animation: slideDown 0.3s ease;
}

@keyframes slideDown {
  from { opacity: 0; transform: translateY(-10px); }
  to { opacity: 1; transform: translateY(0); }
}

.search-box.show { display: block; }

.search-input-wrap {
  position: relative;
}

.search-input {
  width: 100%;
  padding: 12px 16px 12px 44px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-size: 14px;
  font-family: 'Poppins', sans-serif;
  outline: none;
  transition: var(--transition);
}

.search-input:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(229,9,20,0.15);
}

.search-input::placeholder { color: var(--text-muted); }

.search-icon-input {
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
}

.search-results {
  margin-top: 12px;
  max-height: 400px;
  overflow-y: auto;
}

.search-result-item {
  display: flex;
  gap: 12px;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: var(--transition);
}

.search-result-item:hover {
  background: rgba(255,255,255,0.06);
}

.search-result-item img {
  width: 50px;
  height: 75px;
  object-fit: cover;
  border-radius: 6px;
  flex-shrink: 0;
}

.search-result-info h4 {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 4px;
}

.search-result-info span {
  font-size: 11px;
  color: var(--text-muted);
}

/* HERO */
.hero {
  position: relative;
  height: 85vh;
  min-height: 550px;
  max-height: 800px;
  overflow: hidden;
  margin-bottom: 40px;
}

.hero-slides {
  position: relative;
  width: 100%;
  height: 100%;
}

.hero-slide {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1s ease;
}

.hero-slide.active { opacity: 1; }

.hero-bg {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(10,10,10,0.95) 0%, rgba(10,10,10,0.6) 50%, rgba(10,10,10,0.3) 100%),
              linear-gradient(to top, var(--bg-dark) 0%, transparent 40%);
}

.hero-content {
  position: absolute;
  bottom: 15%;
  left: 5%;
  max-width: 600px;
  z-index: 2;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  background: var(--gradient);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  margin-bottom: 16px;
}

.hero-title {
  font-size: 42px;
  font-weight: 800;
  line-height: 1.15;
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--text-secondary);
}

.hero-meta .rating {
  color: #ffd700;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 4px;
}

.hero-overview {
  font-size: 15px;
  color: var(--text-secondary);
  margin-bottom: 24px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  line-height: 1.7;
}

.hero-buttons {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

.btn {
  padding: 12px 28px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 600;
  font-family: 'Poppins', sans-serif;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: var(--transition);
  text-decoration: none;
}

.btn-primary {
  background: var(--gradient);
  color: white;
}

.btn-primary:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(229,9,20,0.4);
}

.btn-secondary {
  background: rgba(255,255,255,0.1);
  color: white;
  border: 1px solid rgba(255,255,255,0.15);
}

.btn-secondary:hover {
  background: rgba(255,255,255,0.2);
  transform: translateY(-2px);
}

.hero-dots {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 8px;
  z-index: 3;
}

.hero-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  cursor: pointer;
  transition: var(--transition);
  border: none;
}

.hero-dot.active {
  background: var(--primary);
  width: 28px;
  border-radius: 5px;
}

/* SECTIONS */
.section {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 24px 50px;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.section-title {
  font-size: 24px;
  font-weight: 700;
  position: relative;
  padding-left: 16px;
}

.section-title::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 4px;
  background: var(--gradient);
  border-radius: 2px;
}

.see-all {
  color: var(--primary);
  text-decoration: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
}

.see-all:hover { color: var(--primary-hover); }

/* MOVIE GRID */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 20px;
}

.movie-card {
  position: relative;
  border-radius: var(--radius);
  overflow: hidden;
  background: var(--bg-card);
  cursor: pointer;
  transition: var(--transition);
}

.movie-card:hover {
  transform: translateY(-8px);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}

.movie-poster-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}

.movie-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.5s ease;
}

.movie-card:hover .movie-poster {
  transform: scale(1.08);
}

.movie-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
  opacity: 0;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.movie-card:hover .movie-overlay { opacity: 1; }

.play-btn-overlay {
  width: 56px;
  height: 56px;
  background: var(--gradient);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: white;
  transform: scale(0.8);
  transition: var(--transition);
  box-shadow: 0 4px 20px rgba(229,9,20,0.5);
}

.movie-card:hover .play-btn-overlay {
  transform: scale(1);
}

.movie-rating-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  color: #ffd700;
  display: flex;
  align-items: center;
  gap: 3px;
  z-index: 2;
}

.movie-quality-badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: var(--primary);
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  z-index: 2;
}

.movie-info {
  padding: 12px;
}

.movie-title {
  font-size: 14px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.movie-year {
  font-size: 12px;
  color: var(--text-muted);
}

/* GENRE PILLS */
.genre-pills {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 30px;
  padding: 0 24px;
  max-width: 1400px;
  margin-left: auto;
  margin-right: auto;
}

.genre-pill {
  padding: 8px 20px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  font-family: 'Poppins', sans-serif;
}

.genre-pill:hover, .genre-pill.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

/* MODAL */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  z-index: 2000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 40px 20px;
}

.modal-overlay.show {
  display: flex;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: #181818;
  border-radius: 16px;
  max-width: 1100px;
  width: 100%;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.8);
  animation: modalSlide 0.4s ease;
  margin: auto;
}

@keyframes modalSlide {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(8px);
  color: white;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.modal-close:hover {
  background: var(--primary);
}

/* PLAYER */
.player-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
}

.player-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* TV SHOW SELECTORS */
.tv-selectors {
  display: flex;
  gap: 12px;
  padding: 16px 24px;
  background: rgba(0,0,0,0.4);
  align-items: center;
  flex-wrap: wrap;
}

.tv-selectors label {
  font-size: 13px;
  color: var(--text-secondary);
  font-weight: 500;
}

.tv-selectors select {
  padding: 8px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 13px;
  cursor: pointer;
  outline: none;
}

.tv-selectors select:focus {
  border-color: var(--primary);
}

.tv-selectors select option {
  background: #1a1a1a;
  color: white;
}

/* MODAL DETAILS */
.modal-details {
  padding: 28px;
}

.modal-top {
  display: flex;
  gap: 28px;
  margin-bottom: 24px;
}

.modal-poster {
  width: 220px;
  flex-shrink: 0;
  border-radius: 12px;
  overflow: hidden;
}

.modal-poster img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
}

.modal-info { flex: 1; }

.modal-title {
  font-size: 32px;
  font-weight: 800;
  margin-bottom: 12px;
  line-height: 1.2;
}

.modal-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  font-size: 14px;
  color: var(--text-secondary);
}

.modal-meta .rating {
  color: #ffd700;
  font-weight: 600;
}

.modal-meta .dot {
  color: var(--text-muted);
}

.modal-genres {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  direction: rtl;
}

.genre-tag {
  padding: 5px 14px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-secondary);
}

.modal-overview {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 20px;
  direction: rtl;
  text-align: right;
}

.modal-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

/* TRAILER MODAL */
.trailer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.9);
  z-index: 3000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.trailer-overlay.show { display: flex; }

.trailer-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 44px;
  height: 44px;
  border: none;
  background: rgba(255,255,255,0.1);
  color: white;
  border-radius: 50%;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}

.trailer-close:hover { background: var(--primary); }

.trailer-container {
  width: 90%;
  max-width: 1000px;
  aspect-ratio: 16/9;
}

.trailer-container iframe {
  width: 100%;
  height: 100%;
  border: none;
  border-radius: 12px;
}

/* LOADING */
.loading-spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 60px;
}

.spinner {
  width: 44px;
  height: 44px;
  border: 3px solid var(--border);
  border-top-color: var(--primary);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* FOOTER */
.footer {
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 40px 24px;
  text-align: center;
  margin-top: 40px;
}

.footer-logo {
  font-size: 24px;
  font-weight: 800;
  background: var(--gradient);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
}

.footer p {
  color: var(--text-muted);
  font-size: 13px;
}

/* PAGINATION */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 40px;
}

.page-btn {
  width: 42px;
  height: 42px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  font-family: 'Poppins', sans-serif;
  font-weight: 500;
  font-size: 14px;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.page-btn:hover, .page-btn.active {
  background: var(--primary);
  border-color: var(--primary);
  color: white;
}

.page-btn:disabled {
  opacity: 0.3;
  cursor: not-allowed;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .header-inner { padding: 0 16px; }
  .nav { display: none; }
  .mobile-menu-btn {
    display: flex !important;
  }
  .hero { height: 70vh; min-height: 450px; }
  .hero-title { font-size: 26px; }
  .hero-content { left: 24px; right: 24px; bottom: 20%; }
  .hero-overview { font-size: 13px; -webkit-line-clamp: 2; }
  .section { padding: 0 16px 40px; }
  .section-title { font-size: 20px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .modal-top { flex-direction: column; }
  .modal-poster { width: 160px; margin: 0 auto; }
  .modal-title { font-size: 24px; }
  .modal-details { padding: 20px; }
  .genre-pills { padding: 0 16px; }
}

@media (max-width: 480px) {
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; }
  .hero-buttons { flex-direction: column; }
  .btn { width: 100%; justify-content: center; }
}

.mobile-menu-btn {
  display: none;
  width: 40px;
  height: 40px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: var(--text-secondary);
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
  align-items: center;
  justify-content: center;
}

.mobile-nav {
  display: none;
  position: fixed;
  top: 70px;
  left: 0;
  right: 0;
  background: var(--bg-header);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 16px;
  z-index: 999;
}

.mobile-nav.show { display: block; }

.mobile-nav a {
  display: block;
  padding: 12px 16px;
  color: var(--text-secondary);
  text-decoration: none;
  font-size: 15px;
  font-weight: 500;
  border-radius: 8px;
  transition: var(--transition);
}

.mobile-nav a:hover, .mobile-nav a.active {
  background: rgba(255,255,255,0.06);
  color: var(--text-primary);
}

.no-image {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 40px;
}

/* Watchlist badge */
.watchlist-badge {
  position: absolute;
  bottom: 80px;
  right: 10px;
  background: var(--primary);
  color: white;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  z-index: 3;
  opacity: 0;
  transition: var(--transition);
}

.movie-card:hover .watchlist-badge {
  opacity: 1;
}

/* Tabs inside detail */
.detail-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  margin-bottom: 20px;
}

.detail-tab {
  padding: 10px 20px;
  background: none;
  border: none;
  color: var(--text-muted);
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: var(--transition);
  position: relative;
}

.detail-tab.active {
  color: var(--primary);
}

.detail-tab.active::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 2px;
  background: var(--primary);
}

/* Back to top */
.back-to-top {
  position: fixed;
  bottom: 30px;
  right: 30px;
  width: 46px;
  height: 46px;
  background: var(--gradient);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 18px;
  cursor: pointer;
  z-index: 999;
  display: none;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 20px rgba(229,9,20,0.4);
  transition: var(--transition);
}

.back-to-top.show { display: flex; }
.back-to-top:hover { transform: translateY(-3px); }
</style>
</head>
<body>

<!-- HEADER -->
<header class="header" id="header">
  <div class="header-inner">
    <a href="#" class="logo" onclick="goHome(); return false;">
      <div class="logo-icon"><i class="fas fa-film"></i></div>
      <span class="logo-text">Movs2nighT</span>
    </a>
    <nav class="nav" id="mainNav">
      <button class="nav-link active" data-tab="home" onclick="switchTab('home')">Home</button>
      <button class="nav-link" data-tab="movies" onclick="switchTab('movies')">Movies</button>
      <button class="nav-link" data-tab="tv" onclick="switchTab('tv')">TV Shows</button>
      <button class="nav-link" data-tab="trending" onclick="switchTab('trending')">Trending</button>
    </nav>
    <div class="search-container">
      <button class="search-toggle" onclick="toggleSearch()"><i class="fas fa-search"></i></button>
      <div class="search-box" id="searchBox">
        <div class="search-input-wrap">
          <i class="fas fa-search search-icon-input"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search movies, TV shows..." oninput="handleSearch(this.value)" onkeydown="if(event.key==='Enter')handleSearch(this.value)">
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
  </div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="#" class="active" data-tab="home" onclick="switchTab('home'); toggleMobileMenu();">Home</a>
  <a href="#" data-tab="movies" onclick="switchTab('movies'); toggleMobileMenu();">Movies</a>
  <a href="#" data-tab="tv" onclick="switchTab('tv'); toggleMobileMenu();">TV Shows</a>
  <a href="#" data-tab="trending" onclick="switchTab('trending'); toggleMobileMenu();">Trending</a>
</nav>

<!-- HERO -->
<section class="hero" id="heroSection">
  <div class="hero-slides" id="heroSlides"></div>
  <div class="hero-dots" id="heroDots"></div>
</section>

<!-- GENRE FILTER -->
<div class="genre-pills" id="genrePills"></div>

<!-- CONTENT -->
<main>
  <section class="section" id="mainSection">
    <div class="section-header">
      <h2 class="section-title" id="sectionTitle">Popular Movies</h2>
      <a class="see-all" id="seeAllBtn" style="display:none;"></a>
    </div>
    <div class="movie-grid" id="movieGrid"></div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">Movs2nighT</div>
  <p>&copy; 2025 Movs2nighT. All rights reserved. Powered by TMDB API.</p>
</footer>

<!-- BACK TO TOP -->
<button class="back-to-top" id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-chevron-up"></i></button>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="player-container" id="playerContainer" style="display:none;">
      <iframe id="playerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="tv-selectors" id="tvSelectors" style="display:none;">
      <label>Season:</label>
      <select id="seasonSelect" onchange="updateEpisodeSelect()"></select>
      <label>Episode:</label>
      <select id="episodeSelect" onchange="loadEpisode()"></select>
    </div>
    <div class="modal-details" id="modalDetails"></div>
  </div>
</div>

<!-- TRAILER MODAL -->
<div class="trailer-overlay" id="trailerOverlay">
  <button class="trailer-close" onclick="closeTrailer()"><i class="fas fa-times"></i></button>
  <div class="trailer-container">
    <iframe id="trailerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<script>
const API_KEY = 'c4bf0cb03e29e3fe72e44c3f2135b55a';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG_URL = 'https://image.tmdb.org/t/p/w500';
const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';
const AR_LANG = 'ar-SA';
const EN_LANG = 'en-US';

let currentTab = 'home';
let currentPage = 1;
let currentGenre = null;
let heroInterval = null;
let heroIndex = 0;
let heroItems = [];

// Genre maps
const movieGenreMap = {};
const tvGenreMap = {};

// Initialize
document.addEventListener('DOMContentLoaded', () => {
  fetchGenres('movie');
  fetchGenres('tv');
  loadHero();
  switchTab('home');
  setupScrollEvents();
});

function setupScrollEvents() {
  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    const backToTop = document.getElementById('backToTop');
    if (window.scrollY > 80) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
    if (window.scrollY > 500) {
      backToTop.classList.add('show');
    } else {
      backToTop.classList.remove('show');
    }
  });
}

async function fetchGenres(type) {
  try {
    const res = await fetch(`${BASE_URL}/genre/${type}/list?api_key=${API_KEY}&language=${AR_LANG}`);
    const data = await res.json();
    const map = type === 'movie' ? movieGenreMap : tvGenreMap;
    data.genres.forEach(g => map[g.id] = g.name);
    if (currentTab === 'home' || currentTab === type) {
      renderGenrePills(type);
    }
  } catch (e) {
    console.error('Genre fetch error:', e);
  }
}

function renderGenrePills(type) {
  const container = document.getElementById('genrePills');
  const map = type === 'movie' ? movieGenreMap : tvGenreMap;
  let html = `<button class="genre-pill active" onclick="filterByGenre(null, '${type}')">All</button>`;
  Object.entries(map).forEach(([id, name]) => {
    html += `<button class="genre-pill" onclick="filterByGenre(${id}, '${type}')">${name}</button>`;
  });
  container.innerHTML = html;
}

function filterByGenre(genreId, type) {
  currentGenre = genreId;
  currentPage = 1;
  document.querySelectorAll('.genre-pill').forEach((p, i) => {
    p.classList.toggle('active', i === 0 ? genreId === null : false);
  });
  if (genreId !== null) {
    document.querySelectorAll('.genre-pill').forEach(p => {
      p.classList.remove('active');
      if (p.textContent === movieGenreMap[genreId] || p.textContent === tvGenreMap[genreId]) {
        p.classList.add('active');
      }
    });
  }
  loadContent();
}

function switchTab(tab) {
  currentTab = tab;
  currentPage = 1;
  currentGenre = null;

  document.querySelectorAll('.nav-link, .mobile-nav a').forEach(link => {
    link.classList.toggle('active', link.dataset.tab === tab);
  });

  if (tab === 'home') {
    document.getElementById('heroSection').style.display = 'block';
    document.getElementById('genrePills').style.display = 'flex';
    renderGenrePills('movie');
    loadHomeContent();
  } else if (tab === 'movies') {
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('genrePills').style.display = 'flex';
    renderGenrePills('movie');
    loadContent();
  } else if (tab === 'tv') {
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('genrePills').style.display = 'flex';
    renderGenrePills('tv');
    loadContent();
  } else if (tab === 'trending') {
    document.getElementById('heroSection').style.display = 'none';
    document.getElementById('genrePills').style.display = 'none';
    loadContent();
  }
}

async function loadHero() {
  try {
    const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=${EN_LANG}`);
    const data = await res.json();
    heroItems = data.results.slice(0, 6);
    renderHeroSlides();
    startHeroAutoplay();
  } catch (e) {
    console.error('Hero load error:', e);
  }
}

function renderHeroSlides() {
  const slidesContainer = document.getElementById('heroSlides');
  const dotsContainer = document.getElementById('heroDots');

  slidesContainer.innerHTML = heroItems.map((item, i) => `
    <div class="hero-slide ${i === 0 ? 'active' : ''}" onclick="openDetail(${item.id}, 'movie')">
      <img class="hero-bg" src="${IMG_ORIGINAL}${item.backdrop_path}" alt="${item.title}" loading="${i === 0 ? 'eager' : 'lazy'}">
      <div class="hero-overlay"></div>
    </div>
  `).join('');

  dotsContainer.innerHTML = heroItems.map((_, i) => `
    <button class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goToHeroSlide(${i})"></button>
  `).join('');
}

function goToHeroSlide(index) {
  heroIndex = index;
  document.querySelectorAll('.hero-slide').forEach((s, i) => s.classList.toggle('active', i === index));
  document.querySelectorAll('.hero-dot').forEach((d, i) => d.classList.toggle('active', i === index));
}

function startHeroAutoplay() {
  heroInterval = setInterval(() => {
    heroIndex = (heroIndex + 1) % heroItems.length;
    goToHeroSlide(heroIndex);
  }, 6000);
}

async function loadHomeContent() {
  document.getElementById('sectionTitle').textContent = 'Popular Movies';
  await loadMovies();
}

async function loadContent() {
  const type = currentTab === 'tv' ? 'tv' : 'movie';
  const isTrending = currentTab === 'trending';

  if (currentTab === 'movies' || currentTab === 'home') {
    document.getElementById('sectionTitle').textContent = currentGenre ? 
      (movieGenreMap[currentGenre] || 'Genre') : 'Popular Movies';
    await loadMovies();
  } else if (currentTab === 'tv') {
    document.getElementById('sectionTitle').textContent = currentGenre ? 
      (tvGenreMap[currentGenre] || 'Genre') : 'Popular TV Shows';
    await loadTvShows();
  } else if (currentTab === 'trending') {
    document.getElementById('sectionTitle').textContent = 'Trending This Week';
    await loadTrending();
  }
}

async function loadMovies() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  try {
    let url;
    if (currentGenre) {
      url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=${EN_LANG}&with_genres=${currentGenre}&sort_by=popularity.desc&page=${currentPage}`;
    } else {
      url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    renderMovies(data.results, 'movie');
    renderPagination(data.total_pages, 'movie');
  } catch (e) {
    console.error('Load movies error:', e);
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Failed to load movies. Please try again.</p>';
  }
}

async function loadTvShows() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  try {
    let url;
    if (currentGenre) {
      url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=${EN_LANG}&with_genres=${currentGenre}&sort_by=popularity.desc&page=${currentPage}`;
    } else {
      url = `${BASE_URL}/tv/popular?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    renderMovies(data.results, 'tv');
    renderPagination(data.total_pages, 'tv');
  } catch (e) {
    console.error('Load TV error:', e);
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Failed to load TV shows. Please try again.</p>';
  }
}

async function loadTrending() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner"></div></div>';

  try {
    const res = await fetch(`${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`);
    const data = await res.json();
    renderMovies(data.results, 'all');
    renderPagination(data.total_pages, 'all');
  } catch (e) {
    console.error('Load trending error:', e);
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Failed to load trending. Please try again.</p>';
  }
}

function renderMovies(items, type) {
  const grid = document.getElementById('movieGrid');
  if (!items || items.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">No results found.</p>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const title = item.title || item.name || 'Unknown';
    const year = (item.release_date || item.first_air_date || '').substring(0, 4);
    const poster = item.poster_path ? `${IMG_URL}${item.poster_path}` : '';
    const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
    const mediaType = item.media_type || type;
    const isMovie = mediaType === 'movie' || (mediaType === 'all' && title && !item.first_air_date) || (type === 'movie');

    return `
      <div class="movie-card" onclick="openDetail(${item.id}, '${mediaType === 'all' ? (item.first_air_date ? 'tv' : 'movie') : mediaType}')">
        <div class="movie-poster-wrap">
          ${poster ? 
            `<img class="movie-poster" src="${poster}" alt="${title}" loading="lazy">` :
            `<div class="no-image" style="width:100%;height:100%;"><i class="fas fa-film"></i></div>`
          }
          <div class="movie-rating-badge"><i class="fas fa-star"></i> ${rating}</div>
          <div class="movie-quality-badge">${mediaType === 'tv' ? 'SERIES' : 'HD'}</div>
          <div class="movie-overlay">
            <div class="play-btn-overlay"><i class="fas fa-play"></i></div>
          </div>
        </div>
        <div class="movie-info">
          <div class="movie-title">${title}</div>
          <div class="movie-year">${year} ${mediaType === 'tv' ? '• TV Show' : '• Movie'}</div>
        </div>
      </div>
    `;
  }).join('');
}

function renderPagination(totalPages, type) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) {
    container.innerHTML = '';
    return;
  }

  let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;

  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  if (startPage > 1) {
    html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
    if (startPage > 2) html += `<span style="color:var(--text-muted)">...</span>`;
  }

  for (let i = startPage; i <= endPage; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }

  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span style="color:var(--text-muted)">...</span>`;
    html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;

  container.innerHTML = html;
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadContent();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// DETAIL MODAL
let currentDetailItem = null;
let currentMediaType = 'movie';

async function openDetail(id, type) {
  currentDetailItem = { id, type };
  currentMediaType = type;

  const modal = document.getElementById('detailModal');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';

  // Reset player
  document.getElementById('playerContainer').style.display = 'none';
  document.getElementById('playerIframe').src = '';
  document.getElementById('tvSelectors').style.display = 'none';

  // Fetch details
  try {
    const [detailRes, creditsRes, arDetailRes] = await Promise.all([
      fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=${EN_LANG}`),
      fetch(`${BASE_URL}/${type}/${id}/credits?api_key=${API_KEY}&language=${EN_LANG}`),
      fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=${AR_LANG}`)
    ]);

    const detail = await detailRes.json();
    const credits = await creditsRes.json();
    const arDetail = await arDetailRes.json();

    // Fetch Arabic genres
    let arGenres = {};
    try {
      const genreRes = await fetch(`${BASE_URL}/genre/${type}/list?api_key=${API_KEY}&language=${AR_LANG}`);
      const genreData = await genreRes.json();
      genreData.genres.forEach(g => arGenres[g.id] = g.name);
    } catch(e) {}

    renderDetailModal(detail, credits, arDetail, arGenres, type);
  } catch (e) {
    console.error('Detail fetch error:', e);
    document.getElementById('modalDetails').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Failed to load details.</p>';
  }
}

function renderDetailModal(detail, credits, arDetail, arGenres, type) {
  const container = document.getElementById('modalDetails');
  const title = detail.title || detail.name;
  const year = (detail.release_date || detail.first_air_date || '').substring(0, 4);
  const rating = detail.vote_average ? detail.vote_average.toFixed(1) : 'N/A';
  const poster = detail.poster_path ? `${IMG_URL}${detail.poster_path}` : '';
  const runtime = detail.runtime ? `${Math.floor(detail.runtime/60)}h ${detail.runtime%60}m` : (detail.episode_run_time?.[0] ? `${detail.episode_run_time[0]}m per ep` : '');
  const genres = (detail.genres || []).map(g => arGenres[g.id] || g.name);
  const overview = arDetail.overview || detail.overview || 'No description available.';
  const cast = (credits.cast || []).slice(0, 8);

  const embedType = type === 'tv' ? 'tv' : 'movie';
  const embedUrl = type === 'movie' 
    ? `https://vsembed.ru/embed/movie?tmdb=${detail.id}&ds_lang=ar`
    : `https://vsembed.ru/embed/tv?tmdb=${detail.id}&season=1&episode=1&ds_lang=ar`;

  // Setup TV selectors
  if (type === 'tv') {
    document.getElementById('tvSelectors').style.display = 'flex';
    const seasonSelect = document.getElementById('seasonSelect');
    seasonSelect.innerHTML = '';
    (detail.seasons || []).filter(s => s.season_number > 0).forEach(s => {
      seasonSelect.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
    });
    updateEpisodeSelect();
  } else {
    document.getElementById('tvSelectors').style.display = 'none';
  }

  const trailerKey = (detail.videos?.results || []).find(v => v.type === 'Trailer' && v.site === 'YouTube')?.key 
    || (detail.videos?.results || []).find(v => v.site === 'YouTube')?.key;

  container.innerHTML = `
    <div class="modal-top">
      <div class="modal-poster">
        ${poster ? `<img src="${poster}" alt="${title}">` : '<div class="no-image" style="width:100%;aspect-ratio:2/3;"><i class="fas fa-film"></i></div>'}
      </div>
      <div class="modal-info">
        <h2 class="modal-title">${title}</h2>
        <div class="modal-meta">
          <span class="rating"><i class="fas fa-star"></i> ${rating}</span>
          <span>${year}</span>
          ${runtime ? `<span><i class="fas fa-clock"></i> ${runtime}</span>` : ''}
          <span style="text-transform:uppercase;font-weight:600;color:var(--primary)">${type === 'tv' ? 'TV Series' : 'Movie'}</span>
        </div>
        <div class="modal-genres">
          ${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" onclick="playMovie('${embedUrl}')">
            <i class="fas fa-play"></i> Watch Now
          </button>
          ${trailerKey ? `<button class="btn btn-secondary" onclick="playTrailer('${trailerKey}')"><i class="fas fa-film"></i> Trailer</button>` : ''}
        </div>
      </div>
    </div>
    <p class="modal-overview">${overview}</p>
    ${cast.length > 0 ? `
      <h3 style="font-size:16px;margin-bottom:12px;font-weight:600;">Cast</h3>
      <div style="display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;">
        ${cast.map(c => `
          <div style="text-align:center;min-width:80px;">
            <div style="width:70px;height:70px;border-radius:50%;overflow:hidden;margin:0 auto 6px;background:#222;">
              ${c.profile_path ? `<img src="${IMG_URL}${c.profile_path}" style="width:100%;height:100%;object-fit:cover;" alt="${c.name}">` : '<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#555;"><i class="fas fa-user"></i></div>'}
            </div>
            <p style="font-size:11px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80px;">${c.name}</p>
          </div>
        `).join('')}
      </div>
    ` : ''}
  `;
}

function playMovie(url) {
  const player = document.getElementById('playerContainer');
  const iframe = document.getElementById('playerIframe');
  iframe.src = url;
  player.style.display = 'block';
  player.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateEpisodeSelect() {
  const season = document.getElementById('seasonSelect').value;
  const episodeSelect = document.getElementById('episodeSelect');
  episodeSelect.innerHTML = '';
  for (let i = 1; i <= 30; i++) {
    episodeSelect.innerHTML += `<option value="${i}">Episode ${i}</option>`;
  }
  loadEpisode();
}

function loadEpisode() {
  if (currentDetailItem && currentDetailItem.type === 'tv') {
    const season = document.getElementById('seasonSelect').value;
    const episode = document.getElementById('episodeSelect').value;
    const url = `https://vsembed.ru/embed/tv?tmdb=${currentDetailItem.id}&season=${season}&episode=${episode}&ds_lang=ar`;
    playMovie(url);
  }
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
  document.getElementById('playerIframe').src = '';
  document.body.style.overflow = '';
}

// TRAILER
function playTrailer(key) {
  const overlay = document.getElementById('trailerOverlay');
  const iframe = document.getElementById('trailerIframe');
  iframe.src = `https://www.youtube.com/embed/${key}?autoplay=1`;
  overlay.classList.add('show');
}

function closeTrailer() {
  document.getElementById('trailerOverlay').classList.remove('show');
  document.getElementById('trailerIframe').src = '';
}

// SEARCH
let searchTimeout = null;
function toggleSearch() {
  const box = document.getElementById('searchBox');
  box.classList.toggle('show');
  if (box.classList.contains('show')) {
    document.getElementById('searchInput').focus();
  }
}

function handleSearch(query) {
  clearTimeout(searchTimeout);
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(() => performSearch(query), 400);
}

async function performSearch(query) {
  const resultsContainer = document.getElementById('searchResults');
  resultsContainer.innerHTML = '<div style="text-align:center;padding:20px;"><div class="spinner" style="margin:0 auto;"></div></div>';

  try {
    const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&language=${EN_LANG}&query=${encodeURIComponent(query)}&page=1`);
    const data = await res.json();
    const items = (data.results || []).filter(item => item.media_type === 'movie' || item.media_type === 'tv').slice(0, 8);

    if (items.length === 0) {
      resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px;">No results found.</p>';
      return;
    }

    resultsContainer.innerHTML = items.map(item => {
      const title = item.title || item.name || 'Unknown';
      const year = (item.release_date || item.first_air_date || '').substring(0, 4);
      const poster = item.poster_path ? `${IMG_URL}${item.poster_path}` : '';
      const type = item.media_type === 'tv' ? 'TV Show' : 'Movie';

      return `
        <div class="search-result-item" onclick="openDetail(${item.id}, '${item.media_type}'); toggleSearch();">
          ${poster ? `<img src="${poster}" alt="${title}">` : '<div style="width:50px;height:75px;background:#222;border-radius:6px;display:flex;align-items:center;justify-content:center;"><i class="fas fa-film" style="color:#555;"></i></div>'}
          <div class="search-result-info">
            <h4>${title}</h4>
            <span>${year} • ${type}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:20px;font-size:13px;">Search failed.</p>';
  }
}

// MOBILE MENU
function toggleMobileMenu() {
  document.getElementById('mobileNav').classList.toggle('show');
}

// HOME
function goHome() {
  switchTab('home');
}

// Close modals on overlay click
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('trailerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeTrailer();
});

// ESC key
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
    closeTrailer();
    document.getElementById('searchBox').classList.remove('show');
  }
});
</script>
</body>
</html>
