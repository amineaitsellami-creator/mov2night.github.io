<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movs2nighT</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --neon-blue: #00f0ff;
  --neon-purple: #8b5cf6;
  --neon-pink: #ec4899;
  --neon-red: #ef4444;
  --dark-bg: #030014;
  --card-bg: rgba(15, 10, 40, 0.6);
  --glass: rgba(255, 255, 255, 0.03);
  --glass-border: rgba(255, 255, 255, 0.08);
  --text-primary: #ffffff;
  --text-secondary: rgba(255, 255, 255, 0.6);
  --text-muted: rgba(255, 255, 255, 0.3);
  --transition: cubic-bezier(0.25, 0.8, 0.25, 1);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  font-family: 'Space Grotesk', sans-serif;
  background: var(--dark-bg);
  color: var(--text-primary);
  overflow-x: hidden;
  cursor: none;
}

/* CUSTOM CURSOR */
.cursor {
  width: 20px;
  height: 20px;
  border: 2px solid var(--neon-blue);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99999;
  transition: transform 0.15s ease, background 0.3s ease, border-color 0.3s ease;
  mix-blend-mode: difference;
}

.cursor.hover {
  transform: scale(2);
  background: rgba(0, 240, 255, 0.1);
  border-color: var(--neon-pink);
}

.cursor-dot {
  width: 6px;
  height: 6px;
  background: var(--neon-blue);
  border-radius: 50%;
  position: fixed;
  pointer-events: none;
  z-index: 99999;
}

/* ANIMATED BACKGROUND */
.bg-grid {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: 
    linear-gradient(rgba(139, 92, 246, 0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(139, 92, 246, 0.03) 1px, transparent 1px);
  background-size: 60px 60px;
  animation: gridMove 20s linear infinite;
}

@keyframes gridMove {
  0% { transform: perspective(500px) rotateX(0deg); }
  100% { transform: perspective(500px) rotateX(2deg); }
}

.bg-glow {
  position: fixed;
  width: 600px;
  height: 600px;
  border-radius: 50%;
  filter: blur(150px);
  z-index: 0;
  animation: glowMove 15s ease-in-out infinite alternate;
}

.bg-glow-1 {
  top: -200px;
  right: -100px;
  background: radial-gradient(circle, rgba(139, 92, 246, 0.15), transparent 70%);
}

.bg-glow-2 {
  bottom: -200px;
  left: -100px;
  background: radial-gradient(circle, rgba(236, 72, 153, 0.12), transparent 70%);
  animation-delay: -5s;
}

.bg-glow-3 {
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(0, 240, 255, 0.08), transparent 70%);
  animation-delay: -10s;
}

@keyframes glowMove {
  0% { transform: translate(0, 0) scale(1); }
  100% { transform: translate(50px, -30px) scale(1.2); }
}

/* FLOATING PARTICLES */
.particles {
  position: fixed;
  inset: 0;
  z-index: 1;
  pointer-events: none;
  overflow: hidden;
}

.particle {
  position: absolute;
  width: 2px;
  height: 2px;
  background: var(--neon-blue);
  border-radius: 50%;
  opacity: 0;
  animation: particleFloat 8s infinite;
  box-shadow: 0 0 6px var(--neon-blue);
}

@keyframes particleFloat {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { opacity: 0; transform: translateY(-100px) scale(1); }
}

/* HEADER - HOLOGRAPHIC GLASS */
.header {
  position: fixed;
  top: 16px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 1000;
  width: calc(100% - 32px);
  max-width: 1300px;
  background: rgba(10, 5, 30, 0.4);
  backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  box-shadow: 
    0 8px 32px rgba(0, 0, 0, 0.4),
    inset 0 1px 0 rgba(255, 255, 255, 0.05);
  transition: all 0.4s var(--transition);
  overflow: hidden;
}

.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, 
    rgba(0, 240, 255, 0.05), 
    rgba(139, 92, 246, 0.05), 
    rgba(236, 72, 153, 0.05));
  border-radius: 20px;
  pointer-events: none;
}

.header.scrolled {
  background: rgba(10, 5, 30, 0.7);
  box-shadow: 0 12px 50px rgba(0, 0, 0, 0.6),
    0 0 30px rgba(139, 92, 246, 0.1);
}

.header-inner {
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  position: relative;
  z-index: 2;
}

.logo {
  display: flex;
  align-items: center;
  gap: 12px;
  text-decoration: none;
  position: relative;
}

.logo-icon-wrap {
  position: relative;
  width: 42px;
  height: 42px;
}

.logo-icon {
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  color: white;
  position: relative;
  z-index: 2;
  animation: logoPulse 3s ease-in-out infinite;
}

.logo-icon-wrap::after {
  content: '';
  position: absolute;
  inset: -4px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple), var(--neon-pink));
  border-radius: 16px;
  opacity: 0;
  filter: blur(8px);
  z-index: 1;
  transition: opacity 0.3s;
  animation: logoPulse 3s ease-in-out infinite;
}

.logo:hover .logo-icon-wrap::after { opacity: 1; }

@keyframes logoPulse {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.2); }
}

.logo-text {
  font-family: 'Orbitron', monospace;
  font-size: 20px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  letter-spacing: 2px;
}

.nav {
  display: flex;
  align-items: center;
  gap: 4px;
}

.nav-link {
  padding: 10px 20px;
  color: var(--text-secondary);
  text-decoration: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 12px;
  transition: all 0.3s var(--transition);
  cursor: pointer;
  border: none;
  background: none;
  position: relative;
  overflow: hidden;
}

.nav-link::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(139, 92, 246, 0.1));
  opacity: 0;
  transition: opacity 0.3s;
  border-radius: 12px;
}

.nav-link:hover::before, .nav-link.active::before { opacity: 1; }

.nav-link:hover, .nav-link.active {
  color: var(--text-primary);
}

.nav-link.active::after {
  content: '';
  position: absolute;
  bottom: 4px;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 2px;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  border-radius: 2px;
}

.search-container {
  position: relative;
}

.search-toggle {
  width: 44px;
  height: 44px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-secondary);
  border-radius: 12px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.search-toggle:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
}

.search-box {
  position: absolute;
  top: calc(100% + 12px);
  right: 0;
  width: 400px;
  max-width: calc(100vw - 40px);
  background: rgba(10, 5, 30, 0.9);
  backdrop-filter: blur(40px) saturate(180%);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  display: none;
  animation: modalSlide 0.4s var(--transition);
}

.search-box.show { display: block; }

.search-input-wrap {
  position: relative;
}

.search-input {
  width: 100%;
  padding: 14px 18px 14px 48px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  color: var(--text-primary);
  font-size: 15px;
  font-family: 'Space Grotesk', sans-serif;
  outline: none;
  transition: all 0.3s var(--transition);
}

.search-input:focus {
  border-color: var(--neon-blue);
  box-shadow: 0 0 0 4px rgba(0, 240, 255, 0.1);
}

.search-input::placeholder { color: var(--text-muted); }

.search-icon-input {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted);
  font-size: 14px;
}

.search-results {
  margin-top: 16px;
  max-height: 380px;
  overflow-y: auto;
}

.search-result-item {
  display: flex;
  gap: 14px;
  padding: 12px;
  border-radius: 14px;
  cursor: pointer;
  transition: all 0.3s var(--transition);
  border: 1px solid transparent;
}

.search-result-item:hover {
  background: rgba(255, 255, 255, 0.04);
  border-color: var(--glass-border);
}

.search-result-item img {
  width: 55px;
  height: 80px;
  object-fit: cover;
  border-radius: 10px;
  flex-shrink: 0;
}

.search-result-info h4 {
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 6px;
}

.search-result-info span {
  font-size: 12px;
  color: var(--text-muted);
}

/* HERO - IMMERSIVE CINEMATIC */
.hero {
  position: relative;
  height: 100vh;
  min-height: 600px;
  max-height: 900px;
  overflow: hidden;
  margin-top: -80px;
  padding-top: 80px;
}

.hero-bg-wrap {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.hero-slide-bg {
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 1.2s ease, transform 10s ease;
  transform: scale(1.05);
}

.hero-slide-bg.active {
  opacity: 1;
  transform: scale(1);
}

.hero-slide-bg img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-gradient {
  position: absolute;
  inset: 0;
  background: 
    radial-gradient(ellipse at 30% 50%, transparent 20%, var(--dark-bg) 100%),
    linear-gradient(to right, var(--dark-bg) 0%, rgba(3, 0, 20, 0.85) 30%, transparent 60%),
    linear-gradient(to top, var(--dark-bg) 0%, transparent 35%),
    linear-gradient(to bottom, var(--dark-bg) 0%, transparent 15%);
  z-index: 2;
}

.hero-content {
  position: absolute;
  left: 5%;
  top: 50%;
  transform: translateY(-50%);
  max-width: 650px;
  z-index: 3;
}

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.15), rgba(139, 92, 246, 0.15));
  border: 1px solid rgba(0, 240, 255, 0.3);
  border-radius: 30px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--neon-blue);
  margin-bottom: 20px;
  backdrop-filter: blur(10px);
  animation: badgePulse 2s ease-in-out infinite;
}

@keyframes badgePulse {
  0%, 100% { box-shadow: 0 0 15px rgba(0, 240, 255, 0.2); }
  50% { box-shadow: 0 0 30px rgba(0, 240, 255, 0.4); }
}

.hero-title {
  font-family: 'Orbitron', monospace;
  font-size: 48px;
  font-weight: 900;
  line-height: 1.15;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: titleGlow 4s ease-in-out infinite;
}

@keyframes titleGlow {
  0%, 100% { filter: brightness(1); }
  50% { filter: brightness(1.3); }
}

.hero-meta {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 18px;
  flex-wrap: wrap;
}

.hero-meta-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 15px;
  font-weight: 500;
  color: var(--text-secondary);
}

.hero-meta-item i { color: var(--neon-blue); font-size: 13px; }
.hero-meta-item.rating i { color: #ffd700; }

.hero-overview {
  font-size: 16px;
  color: var(--text-secondary);
  line-height: 1.8;
  margin-bottom: 28px;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.hero-buttons {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

.btn-future {
  padding: 14px 32px;
  border: none;
  border-radius: 14px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  transition: all 0.4s var(--transition);
  position: relative;
  overflow: hidden;
}

.btn-future::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent, rgba(255, 255, 255, 0.15), transparent);
  transform: translateX(-100%);
  transition: transform 0.6s;
}

.btn-future:hover::before { transform: translateX(100%); }

.btn-play {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  color: white;
  box-shadow: 0 6px 30px rgba(0, 240, 255, 0.3);
}

.btn-play:hover {
  transform: translateY(-3px);
  box-shadow: 0 12px 40px rgba(0, 240, 255, 0.5);
}

.btn-trailer {
  background: rgba(255, 255, 255, 0.06);
  border: 1px solid var(--glass-border);
  color: white;
  backdrop-filter: blur(10px);
}

.btn-trailer:hover {
  background: rgba(255, 255, 255, 0.1);
  border-color: var(--neon-pink);
  box-shadow: 0 8px 30px rgba(236, 72, 153, 0.2);
  transform: translateY(-3px);
}

/* HERO CONTROLS */
.hero-controls {
  position: absolute;
  bottom: 8%;
  right: 5%;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 20px;
}

.hero-progress {
  width: 200px;
  height: 3px;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 3px;
  overflow: hidden;
}

.hero-progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
  border-radius: 3px;
  width: 0%;
  animation: progressFill 6s linear forwards;
}

@keyframes progressFill {
  to { width: 100%; }
}

.hero-nav-btn {
  width: 48px;
  height: 48px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.05);
  color: var(--text-secondary);
  border-radius: 14px;
  cursor: pointer;
  font-size: 16px;
  transition: all 0.3s var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(10px);
}

.hero-nav-btn:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
  transform: scale(1.1);
}

/* SCROLL INDICATOR */
.scroll-indicator {
  position: absolute;
  bottom: 5%;
  left: 50%;
  transform: translateX(-50%);
  z-index: 3;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  animation: scrollBounce 2s ease-in-out infinite;
}

.scroll-indicator span {
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-muted);
}

.scroll-line {
  width: 1px;
  height: 40px;
  background: linear-gradient(to bottom, var(--neon-blue), transparent);
}

@keyframes scrollBounce {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(10px); }
}

/* SECTIONS */
.section {
  max-width: 1350px;
  margin: 0 auto;
  padding: 60px 28px 80px;
  position: relative;
  z-index: 2;
}

.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
  position: relative;
}

.section-title-wrap {
  display: flex;
  align-items: center;
  gap: 16px;
}

.section-icon {
  width: 48px;
  height: 48px;
  background: linear-gradient(135deg, rgba(0, 240, 255, 0.1), rgba(139, 92, 246, 0.1));
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  color: var(--neon-blue);
}

.section-title {
  font-family: 'Orbitron', monospace;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 1px;
}

.section-title span {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.see-all {
  color: var(--neon-blue);
  text-decoration: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.3s var(--transition);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 10px 18px;
  border: 1px solid var(--glass-border);
  border-radius: 10px;
  background: rgba(0, 240, 255, 0.05);
}

.see-all:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
}

/* GENRE PILLS - FUTURISTIC */
.genre-pills {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 40px;
  padding: 0 28px;
  max-width: 1350px;
  margin-left: auto;
  margin-right: auto;
}

.genre-pill {
  padding: 10px 22px;
  border: 1px solid var(--glass-border);
  border-radius: 30px;
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-secondary);
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.5px;
  cursor: pointer;
  transition: all 0.4s var(--transition);
  backdrop-filter: blur(10px);
  position: relative;
  overflow: hidden;
}

.genre-pill::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  opacity: 0;
  transition: opacity 0.3s;
}

.genre-pill:hover::before, .genre-pill.active::before { opacity: 1; }

.genre-pill:hover, .genre-pill.active {
  border-color: transparent;
  color: white;
  box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
  transform: translateY(-2px);
}

/* MOVIE GRID - 3D CARDS */
.movie-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 24px;
}

.movie-card {
  position: relative;
  border-radius: 18px;
  overflow: hidden;
  background: var(--card-bg);
  cursor: pointer;
  transition: all 0.5s var(--transition);
  border: 1px solid transparent;
}

.movie-card:hover {
  transform: translateY(-12px) scale(1.02);
  border-color: var(--glass-border);
  box-shadow: 
    0 20px 50px rgba(0, 0, 0, 0.5),
    0 0 40px rgba(0, 240, 255, 0.1);
}

.movie-poster-wrap {
  position: relative;
  aspect-ratio: 2/3;
  overflow: hidden;
}

.movie-poster {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.7s var(--transition);
}

.movie-card:hover .movie-poster {
  transform: scale(1.1);
}

.movie-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(3, 0, 20, 0.95) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.4s var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}

.movie-card:hover .movie-overlay { opacity: 1; }

.play-btn-circle {
  width: 64px;
  height: 64px;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: white;
  transform: scale(0.5);
  transition: all 0.4s var(--transition);
  box-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
}

.movie-card:hover .play-btn-circle {
  transform: scale(1);
}

.rating-orb {
  position: absolute;
  top: 14px;
  right: 14px;
  width: 44px;
  height: 44px;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Rajdhani', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: #ffd700;
  z-index: 2;
  transition: all 0.3s var(--transition);
}

.movie-card:hover .rating-orb {
  border-color: #ffd700;
  box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
}

.quality-tag {
  position: absolute;
  top: 14px;
  left: 14px;
  padding: 4px 12px;
  background: linear-gradient(135deg, var(--neon-red), var(--neon-pink));
  border-radius: 8px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  z-index: 2;
  box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
}

.movie-info {
  padding: 14px;
}

.movie-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 4px;
}

.movie-year {
  font-size: 12px;
  color: var(--text-muted);
  display: flex;
  align-items: center;
  gap: 6px;
}

.movie-year::before {
  content: '';
  width: 4px;
  height: 4px;
  background: var(--neon-blue);
  border-radius: 50%;
}

/* PAGINATION - HOLOGRAPHIC */
.pagination {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 50px;
}

.page-btn {
  min-width: 46px;
  height: 46px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.03);
  color: var(--text-secondary);
  border-radius: 12px;
  cursor: pointer;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600;
  font-size: 15px;
  transition: all 0.3s var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}

.page-btn:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
  transform: translateY(-2px);
}

.page-btn.active {
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  border-color: transparent;
  color: white;
  box-shadow: 0 6px 25px rgba(0, 240, 255, 0.3);
}

.page-btn:disabled {
  opacity: 0.2;
  cursor: not-allowed;
}

/* MODAL - QUANTUM GLASS */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3, 0, 20, 0.9);
  backdrop-filter: blur(30px);
  z-index: 2000;
  display: none;
  align-items: flex-start;
  justify-content: center;
  overflow-y: auto;
  padding: 40px 20px;
}

.modal-overlay.show {
  display: flex;
  animation: modalFadeIn 0.4s ease;
}

@keyframes modalFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal {
  background: rgba(10, 5, 30, 0.8);
  backdrop-filter: blur(40px) saturate(200%);
  border: 1px solid var(--glass-border);
  border-radius: 28px;
  max-width: 1100px;
  width: 100%;
  overflow: hidden;
  box-shadow: 
    0 30px 80px rgba(0, 0, 0, 0.6),
    0 0 60px rgba(139, 92, 246, 0.1);
  animation: modalScale 0.5s var(--transition);
  margin: auto;
}

@keyframes modalScale {
  from { opacity: 0; transform: translateY(40px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

.modal-close {
  position: absolute;
  top: 20px;
  right: 20px;
  width: 48px;
  height: 48px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(20px);
  color: white;
  border-radius: 14px;
  font-size: 18px;
  cursor: pointer;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s var(--transition);
}

.modal-close:hover {
  background: var(--neon-red);
  border-color: var(--neon-red);
  box-shadow: 0 0 30px rgba(239, 68, 68, 0.4);
  transform: rotate(90deg);
}

/* PLAYER */
.player-container {
  position: relative;
  width: 100%;
  aspect-ratio: 16/9;
  background: #000;
}

.player-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* TV SELECTORS */
.tv-selectors {
  display: flex;
  gap: 14px;
  padding: 20px 28px;
  background: rgba(0, 0, 0, 0.3);
  align-items: center;
  flex-wrap: wrap;
  border-top: 1px solid var(--glass-border);
  border-bottom: 1px solid var(--glass-border);
}

.tv-selectors label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.tv-selectors select {
  padding: 10px 18px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  color: white;
  font-family: 'Rajdhani', sans-serif;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  outline: none;
  transition: all 0.3s var(--transition);
  min-width: 100px;
}

.tv-selectors select:focus {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.15);
}

.tv-selectors select option {
  background: #0a051e;
  color: white;
}

/* MODAL DETAILS */
.modal-details {
  padding: 32px;
}

.modal-top {
  display: flex;
  gap: 32px;
  margin-bottom: 28px;
}

.modal-poster {
  width: 240px;
  flex-shrink: 0;
  border-radius: 18px;
  overflow: hidden;
  box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
  border: 1px solid var(--glass-border);
}

.modal-poster img {
  width: 100%;
  aspect-ratio: 2/3;
  object-fit: cover;
}

.modal-info { flex: 1; }

.modal-title {
  font-family: 'Orbitron', monospace;
  font-size: 30px;
  font-weight: 800;
  margin-bottom: 14px;
  line-height: 1.2;
  background: linear-gradient(135deg, #fff, rgba(255, 255, 255, 0.8));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.modal-meta {
  display: flex;
  gap: 16px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  font-size: 14px;
  color: var(--text-secondary);
  font-family: 'Rajdhani', sans-serif;
  font-weight: 500;
}

.modal-meta .rating {
  color: #ffd700;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 4px;
}

.modal-meta .dot {
  color: var(--text-muted);
  font-size: 20px;
}

.modal-genres {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 18px;
  direction: rtl;
}

.genre-tag {
  padding: 6px 16px;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  font-size: 12px;
  color: var(--text-secondary);
  transition: all 0.3s;
}

.genre-tag:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
}

.modal-overview {
  font-size: 15px;
  color: var(--text-secondary);
  line-height: 1.9;
  margin-bottom: 24px;
  direction: rtl;
  text-align: right;
  padding-right: 8px;
}

.modal-actions {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

/* CAST */
.cast-section {
  margin-top: 24px;
  padding-top: 24px;
  border-top: 1px solid var(--glass-border);
}

.cast-title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--text-primary);
}

.cast-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  padding-bottom: 12px;
}

.cast-scroll::-webkit-scrollbar { height: 4px; }
.cast-scroll::-webkit-scrollbar-track { background: transparent; }
.cast-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 4px; }

.cast-card {
  text-align: center;
  min-width: 90px;
  flex-shrink: 0;
}

.cast-avatar {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  overflow: hidden;
  margin: 0 auto 8px;
  border: 2px solid var(--glass-border);
  transition: all 0.3s;
}

.cast-avatar:hover {
  border-color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
}

.cast-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.cast-avatar .no-avatar {
  width: 100%;
  height: 100%;
  background: var(--card-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 24px;
}

.cast-name {
  font-size: 11px;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 90px;
}

/* TRAILER MODAL */
.trailer-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3, 0, 20, 0.95);
  backdrop-filter: blur(30px);
  z-index: 3000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 40px;
}

.trailer-overlay.show { display: flex; }

.trailer-close {
  position: absolute;
  top: 24px;
  right: 24px;
  width: 50px;
  height: 50px;
  border: 1px solid var(--glass-border);
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(20px);
  color: white;
  border-radius: 14px;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.trailer-close:hover {
  background: var(--neon-red);
  border-color: var(--neon-red);
  transform: rotate(90deg);
}

.trailer-container {
  width: 90%;
  max-width: 1100px;
  aspect-ratio: 16/9;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 80px rgba(139, 92, 246, 0.15);
  border: 1px solid var(--glass-border);
}

.trailer-container iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* LOADING */
.loading-spinner {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px;
  grid-column: 1 / -1;
}

.spinner-ring {
  width: 50px;
  height: 50px;
  border: 3px solid var(--glass-border);
  border-top-color: var(--neon-blue);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

.spinner-ring::after {
  content: '';
  position: absolute;
  inset: -6px;
  border: 2px solid transparent;
  border-top-color: var(--neon-purple);
  border-radius: 50%;
  animation: spin 1.2s linear infinite reverse;
}

.spinner-ring {
  position: relative;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* FOOTER */
.footer {
  background: rgba(10, 5, 30, 0.4);
  border-top: 1px solid var(--glass-border);
  padding: 60px 28px 30px;
  text-align: center;
  margin-top: 80px;
  position: relative;
  z-index: 2;
}

.footer-logo {
  font-family: 'Orbitron', monospace;
  font-size: 28px;
  font-weight: 800;
  background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 12px;
  letter-spacing: 2px;
}

.footer p {
  color: var(--text-muted);
  font-size: 13px;
  margin-bottom: 6px;
}

.footer-links {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 20px;
}

.footer-links a {
  width: 42px;
  height: 42px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.03);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  font-size: 16px;
  text-decoration: none;
  transition: all 0.3s;
}

.footer-links a:hover {
  border-color: var(--neon-blue);
  color: var(--neon-blue);
  box-shadow: 0 0 20px rgba(0, 240, 255, 0.2);
  transform: translateY(-3px);
}

/* MOBILE */
.mobile-menu-btn {
  display: none;
  width: 44px;
  height: 44px;
  border: 1px solid var(--glass-border);
  background: rgba(255, 255, 255, 0.04);
  color: var(--text-secondary);
  border-radius: 12px;
  cursor: pointer;
  font-size: 18px;
  align-items: center;
  justify-content: center;
  transition: all 0.3s;
}

.mobile-nav {
  display: none;
  position: fixed;
  top: 100px;
  left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px);
  max-width: 1300px;
  background: rgba(10, 5, 30, 0.95);
  backdrop-filter: blur(40px);
  border: 1px solid var(--glass-border);
  border-radius: 20px;
  padding: 16px;
  z-index: 999;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}

.mobile-nav.show { display: block; }

.mobile-nav a {
  display: block;
  padding: 14px 20px;
  color: var(--text-secondary);
  text-decoration: none;
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  border-radius: 12px;
  transition: all 0.3s;
}

.mobile-nav a:hover, .mobile-nav a.active {
  background: rgba(0, 240, 255, 0.06);
  color: var(--neon-blue);
}

/* RESPONSIVE */
@media (max-width: 1024px) {
  .hero-title { font-size: 36px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 18px; }
  .modal-top { flex-direction: column; align-items: center; text-align: center; }
  .modal-poster { width: 200px; }
  .modal-genres { justify-content: center; }
  .modal-meta { justify-content: center; }
  .modal-actions { justify-content: center; }
  .modal-overview { text-align: center; direction: ltr; }
}

@media (max-width: 768px) {
  body { cursor: auto; }
  .cursor, .cursor-dot { display: none; }
  .header { top: 8px; width: calc(100% - 16px); border-radius: 16px; }
  .header-inner { padding: 12px 16px; }
  .nav { display: none; }
  .mobile-menu-btn { display: flex; }
  .hero { height: 100vh; min-height: 550px; }
  .hero-title { font-size: 28px; }
  .hero-content { left: 20px; right: 20px; max-width: calc(100% - 40px); }
  .hero-buttons { flex-direction: column; }
  .btn-future { width: 100%; justify-content: center; }
  .section { padding: 40px 16px 60px; }
  .section-title { font-size: 20px; }
  .movie-grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; }
  .genre-pills { padding: 0 16px; }
  .modal { border-radius: 20px; }
  .modal-details { padding: 20px; }
  .modal-title { font-size: 22px; }
  .hero-controls { bottom: 12%; right: auto; left: 50%; transform: translateX(-50%); }
  .hero-progress { width: 120px; }
  .scroll-indicator { display: none; }
  .footer { padding: 40px 16px 24px; }
}

@media (max-width: 480px) {
  .logo-text { font-size: 16px; }
  .logo-icon-wrap { width: 36px; height: 36px; }
  .hero-title { font-size: 24px; }
  .hero-badge { font-size: 11px; padding: 6px 14px; }
  .hero-overview { font-size: 14px; }
  .search-box { width: calc(100vw - 32px); }
}

/* GLITCH EFFECT FOR LOGO */
.logo:hover .logo-text {
  animation: glitch 0.3s ease;
}

@keyframes glitch {
  0% { transform: translate(0); }
  20% { transform: translate(-2px, 2px); }
  40% { transform: translate(2px, -2px); }
  60% { transform: translate(-1px, 1px); }
  80% { transform: translate(1px, -1px); }
  100% { transform: translate(0); }
}

.no-image {
  background: linear-gradient(135deg, #0a0520 0%, #1a0a30 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  font-size: 40px;
  width: 100%;
  height: 100%;
}
</style>
</head>
<body>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>
<div class="cursor-dot" id="cursorDot"></div>

<!-- BG EFFECTS -->
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="bg-glow bg-glow-3"></div>
<div class="particles" id="particles"></div>

<!-- HEADER -->
<header class="header" id="header">
  <div class="header-inner">
    <a href="#" class="logo" onclick="goHome(); return false;">
      <div class="logo-icon-wrap">
        <div class="logo-icon"><i class="fas fa-play"></i></div>
      </div>
      <span class="logo-text">MOV2NIGHT</span>
    </a>
    <nav class="nav" id="mainNav">
      <button class="nav-link active" data-tab="home" onclick="switchTab('home')">Home</button>
      <button class="nav-link" data-tab="movies" onclick="switchTab('movies')">Movies</button>
      <button class="nav-link" data-tab="tv" onclick="switchTab('tv')">TV Shows</button>
      <button class="nav-link" data-tab="trending" onclick="switchTab('trending')">Trending</button>
    </nav>
    <div class="search-container">
      <button class="search-toggle" onclick="toggleSearch()"><i class="fas fa-search"></i></button>
      <div class="search-box" id="searchBox">
        <div class="search-input-wrap">
          <i class="fas fa-search search-icon-input"></i>
          <input type="text" class="search-input" id="searchInput" placeholder="Search movies & shows..." oninput="handleSearch(this.value)">
        </div>
        <div class="search-results" id="searchResults"></div>
      </div>
    </div>
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()"><i class="fas fa-bars"></i></button>
  </div>
</header>

<nav class="mobile-nav" id="mobileNav">
  <a href="#" class="active" data-tab="home" onclick="switchTab('home'); toggleMobileMenu(); return false;">Home</a>
  <a href="#" data-tab="movies" onclick="switchTab('movies'); toggleMobileMenu(); return false;">Movies</a>
  <a href="#" data-tab="tv" onclick="switchTab('tv'); toggleMobileMenu(); return false;">TV Shows</a>
  <a href="#" data-tab="trending" onclick="switchTab('trending'); toggleMobileMenu(); return false;">Trending</a>
</nav>

<!-- HERO -->
<section class="hero" id="heroSection">
  <div class="hero-bg-wrap" id="heroSlides"></div>
  <div class="hero-gradient"></div>
  <div class="hero-content" id="heroContent"></div>
  <div class="hero-controls">
    <div class="hero-progress"><div class="hero-progress-bar" id="heroProgress"></div></div>
    <button class="hero-nav-btn" onclick="prevHero()"><i class="fas fa-chevron-left"></i></button>
    <button class="hero-nav-btn" onclick="nextHero()"><i class="fas fa-chevron-right"></i></button>
  </div>
  <div class="scroll-indicator">
    <span>Scroll</span>
    <div class="scroll-line"></div>
  </div>
</section>

<!-- GENRE PILLS -->
<div class="genre-pills" id="genrePills"></div>

<!-- CONTENT -->
<main>
  <section class="section" id="mainSection">
    <div class="section-header">
      <div class="section-title-wrap">
        <div class="section-icon"><i class="fas fa-fire" id="sectionIcon"></i></div>
        <h2 class="section-title" id="sectionTitle">Popular <span>Movies</span></h2>
      </div>
    </div>
    <div class="movie-grid" id="movieGrid"></div>
    <div class="pagination" id="pagination"></div>
  </section>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-logo">MOV2NIGHT</div>
  <p>Stream your favorite movies and TV shows</p>
  <p>&copy; 2025 Movs2nighT. All rights reserved. Powered by TMDB API.</p>
  <div class="footer-links">
    <a href="#"><i class="fab fa-twitter"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-telegram"></i></a>
    <a href="#"><i class="fab fa-discord"></i></a>
  </div>
</footer>

<!-- DETAIL MODAL -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
    <div class="player-container" id="playerContainer" style="display:none;">
      <iframe id="playerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
    </div>
    <div class="tv-selectors" id="tvSelectors" style="display:none;">
      <label>Season:</label>
      <select id="seasonSelect" onchange="updateEpisodeSelect()"></select>
      <label>Episode:</label>
      <select id="episodeSelect" onchange="loadEpisode()"></select>
    </div>
    <div class="modal-details" id="modalDetails"></div>
  </div>
</div>

<!-- TRAILER MODAL -->
<div class="trailer-overlay" id="trailerOverlay">
  <button class="trailer-close" onclick="closeTrailer()"><i class="fas fa-times"></i></button>
  <div class="trailer-container">
    <iframe id="trailerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
  </div>
</div>

<script>
const API_KEY = 'c4bf0cb03e29e3fe72e44c3f2135b55a';
const BASE_URL = 'https://api.themoviedb.org/3';
const IMG_URL = 'https://image.tmdb.org/t/p/w500';
const IMG_ORIGINAL = 'https://image.tmdb.org/t/p/original';
const AR_LANG = 'ar-SA';
const EN_LANG = 'en-US';

let currentTab = 'home';
let currentPage = 1;
let currentGenre = null;
let heroInterval = null;
let heroIndex = 0;
let heroItems = [];
let heroTimer = null;
let searchTimeout = null;
let currentDetailItem = null;

const movieGenreMap = {};
const tvGenreMap = {};

// Custom Cursor
const cursor = document.getElementById('cursor');
const cursorDot = document.getElementById('cursorDot');
let mouseX = 0, mouseY = 0, cursorX = 0, cursorY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  cursorDot.style.left = mouseX - 3 + 'px';
  cursorDot.style.top = mouseY - 3 + 'px';
});

function animateCursor() {
  cursorX += (mouseX - cursorX) * 0.15;
  cursorY += (mouseY - cursorY) * 0.15;
  cursor.style.left = cursorX - 10 + 'px';
  cursor.style.top = cursorY - 10 + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

document.querySelectorAll('a, button, .movie-card, .genre-pill, .search-result-item').forEach(el => {
  el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
  el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
});

// Particles
const particlesContainer = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (6 + Math.random() * 6) + 's';
  const colors = ['var(--neon-blue)', 'var(--neon-purple)', 'var(--neon-pink)'];
  p.style.background = colors[Math.floor(Math.random() * 3)];
  p.style.boxShadow = `0 0 6px ${p.style.background}`;
  particlesContainer.appendChild(p);
}

// Init
document.addEventListener('DOMContentLoaded', () => {
  fetchGenres('movie');
  fetchGenres('tv');
  loadHero();
  switchTab('home');
  setupScrollEvents();
});

function setupScrollEvents() {
  window.addEventListener('scroll', () => {
    const header = document.getElementById('header');
    if (window.scrollY > 50) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });
}

async function fetchGenres(type) {
  try {
    const res = await fetch(`${BASE_URL}/genre/${type}/list?api_key=${API_KEY}&language=${AR_LANG}`);
    const data = await res.json();
    const map = type === 'movie' ? movieGenreMap : tvGenreMap;
    data.genres.forEach(g => map[g.id] = g.name);
    if ((currentTab === 'home' || currentTab === type) && type === (currentTab === 'home' ? 'movie' : currentTab)) {
      renderGenrePills(type);
    }
  } catch (e) {
    console.error('Genre fetch error:', e);
  }
}

function renderGenrePills(type) {
  const container = document.getElementById('genrePills');
  const map = type === 'movie' ? movieGenreMap : tvGenreMap;
  let html = `<button class="genre-pill active" onclick="filterByGenre(null, '${type}')">All</button>`;
  Object.entries(map).forEach(([id, name]) => {
    html += `<button class="genre-pill" onclick="filterByGenre(${id}, '${type}')">${name}</button>`;
  });
  container.innerHTML = html;
  
  // Re-apply hover events to new elements
  document.querySelectorAll('.genre-pill').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });
}

function filterByGenre(genreId, type) {
  currentGenre = genreId;
  currentPage = 1;
  document.querySelectorAll('.genre-pill').forEach(p => {
    p.classList.remove('active');
    if (genreId === null && p.textContent === 'All') p.classList.add('active');
    else if (p.textContent === movieGenreMap[genreId] || p.textContent === tvGenreMap[genreId]) p.classList.add('active');
  });
  loadContent();
}

function switchTab(tab) {
  currentTab = tab;
  currentPage = 1;
  currentGenre = null;

  document.querySelectorAll('.nav-link, .mobile-nav a').forEach(link => {
    link.classList.toggle('active', link.dataset.tab === tab);
  });

  const heroSection = document.getElementById('heroSection');
  const genrePills = document.getElementById('genrePills');

  if (tab === 'home') {
    heroSection.style.display = 'block';
    genrePills.style.display = 'flex';
    renderGenrePills('movie');
    loadHomeContent();
  } else if (tab === 'movies') {
    heroSection.style.display = 'none';
    genrePills.style.display = 'flex';
    renderGenrePills('movie');
    loadContent();
  } else if (tab === 'tv') {
    heroSection.style.display = 'none';
    genrePills.style.display = 'flex';
    renderGenrePills('tv');
    loadContent();
  } else if (tab === 'trending') {
    heroSection.style.display = 'none';
    genrePills.style.display = 'none';
    loadContent();
  }
}

async function loadHomeContent() {
  document.getElementById('sectionTitle').innerHTML = 'Popular <span>Movies</span>';
  document.getElementById('sectionIcon').className = 'fas fa-fire';
  await loadMovies();
}

async function loadContent() {
  const type = currentTab === 'tv' ? 'tv' : 'movie';
  const isTrending = currentTab === 'trending';

  if (currentTab === 'movies' || currentTab === 'home') {
    document.getElementById('sectionTitle').innerHTML = currentGenre ? 
      (movieGenreMap[currentGenre] || '<span>Genre</span>') : 'Popular <span>Movies</span>';
    document.getElementById('sectionIcon').className = 'fas fa-film';
    await loadMovies();
  } else if (currentTab === 'tv') {
    document.getElementById('sectionTitle').innerHTML = currentGenre ? 
      (tvGenreMap[currentGenre] || '<span>Genre</span>') : 'Popular <span>TV Shows</span>';
    document.getElementById('sectionIcon').className = 'fas fa-tv';
    await loadTvShows();
  } else if (currentTab === 'trending') {
    document.getElementById('sectionTitle').innerHTML = 'Trending <span>This Week</span>';
    document.getElementById('sectionIcon').className = 'fas fa-chart-line';
    await loadTrending();
  }
}

async function loadMovies() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner-ring"></div></div>';

  try {
    let url;
    if (currentGenre) {
      url = `${BASE_URL}/discover/movie?api_key=${API_KEY}&language=${EN_LANG}&with_genres=${currentGenre}&sort_by=popularity.desc&page=${currentPage}`;
    } else {
      url = `${BASE_URL}/movie/popular?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    renderMovies(data.results, 'movie');
    renderPagination(data.total_pages);
  } catch (e) {
    console.error('Load movies error:', e);
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">Failed to load. Try again.</p>';
  }
}

async function loadTvShows() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner-ring"></div></div>';

  try {
    let url;
    if (currentGenre) {
      url = `${BASE_URL}/discover/tv?api_key=${API_KEY}&language=${EN_LANG}&with_genres=${currentGenre}&sort_by=popularity.desc&page=${currentPage}`;
    } else {
      url = `${BASE_URL}/tv/popular?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`;
    }
    const res = await fetch(url);
    const data = await res.json();
    renderMovies(data.results, 'tv');
    renderPagination(data.total_pages);
  } catch (e) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">Failed to load. Try again.</p>';
  }
}

async function loadTrending() {
  const grid = document.getElementById('movieGrid');
  grid.innerHTML = '<div class="loading-spinner"><div class="spinner-ring"></div></div>';

  try {
    const res = await fetch(`${BASE_URL}/trending/all/week?api_key=${API_KEY}&language=${EN_LANG}&page=${currentPage}`);
    const data = await res.json();
    renderMovies(data.results, 'all');
    renderPagination(data.total_pages);
  } catch (e) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">Failed to load. Try again.</p>';
  }
}

function renderMovies(items, type) {
  const grid = document.getElementById('movieGrid');
  if (!items || items.length === 0) {
    grid.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:60px;grid-column:1/-1;">No results found.</p>';
    return;
  }

  grid.innerHTML = items.map(item => {
    const title = item.title || item.name || 'Unknown';
    const year = (item.release_date || item.first_air_date || '').substring(0, 4);
    const poster = item.poster_path ? `${IMG_URL}${item.poster_path}` : '';
    const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
    const mediaType = item.media_type || type;
    const isMovie = mediaType === 'movie' || type === 'movie';
    const finalType = mediaType === 'all' ? (item.first_air_date ? 'tv' : 'movie') : mediaType;

    return `
      <div class="movie-card" onclick="openDetail(${item.id}, '${finalType}')">
        <div class="movie-poster-wrap">
          ${poster ? 
            `<img class="movie-poster" src="${poster}" alt="${title}" loading="lazy">` :
            `<div class="no-image"><i class="fas fa-film"></i></div>`
          }
          <div class="rating-orb"><i class="fas fa-star" style="font-size:9px;margin-right:2px;"></i>${rating}</div>
          <div class="quality-tag">${finalType === 'tv' ? 'SERIES' : '4K'}</div>
          <div class="movie-overlay">
            <div class="play-btn-circle"><i class="fas fa-play" style="margin-left:3px;"></i></div>
          </div>
        </div>
        <div class="movie-info">
          <div class="movie-title">${title}</div>
          <div class="movie-year">${year} ${finalType === 'tv' ? 'TV Show' : 'Movie'}</div>
        </div>
      </div>
    `;
  }).join('');

  // Add hover listeners for cursor
  document.querySelectorAll('.movie-card').forEach(el => {
    el.addEventListener('mouseenter', () => cursor.classList.add('hover'));
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover'));
  });
}

function renderPagination(totalPages) {
  const container = document.getElementById('pagination');
  if (totalPages <= 1) { container.innerHTML = ''; return; }

  let html = `<button class="page-btn" onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-chevron-left"></i></button>`;

  let startPage = Math.max(1, currentPage - 2);
  let endPage = Math.min(totalPages, currentPage + 2);

  if (startPage > 1) {
    html += `<button class="page-btn" onclick="changePage(1)">1</button>`;
    if (startPage > 2) html += `<span style="color:var(--text-muted)">...</span>`;
  }

  for (let i = startPage; i <= endPage; i++) {
    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
  }

  if (endPage < totalPages) {
    if (endPage < totalPages - 1) html += `<span style="color:var(--text-muted)">...</span>`;
    html += `<button class="page-btn" onclick="changePage(${totalPages})">${totalPages}</button>`;
  }

  html += `<button class="page-btn" onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-chevron-right"></i></button>`;
  container.innerHTML = html;
}

function changePage(page) {
  if (page < 1) return;
  currentPage = page;
  loadContent();
  window.scrollTo({ top: 400, behavior: 'smooth' });
}

// HERO
async function loadHero() {
  try {
    const res = await fetch(`${BASE_URL}/trending/movie/week?api_key=${API_KEY}&language=${EN_LANG}`);
    const data = await res.json();
    heroItems = data.results.slice(0, 6);
    renderHero();
    startHeroAutoplay();
  } catch (e) {
    console.error('Hero error:', e);
  }
}

function renderHero() {
  const slides = document.getElementById('heroSlides');
  const content = document.getElementById('heroContent');
  
  slides.innerHTML = heroItems.map((item, i) => `
    <div class="hero-slide-bg ${i === 0 ? 'active' : ''}" onclick="openDetail(${item.id}, 'movie')">
      <img src="${IMG_ORIGINAL}${item.backdrop_path}" alt="${item.title}" loading="${i === 0 ? 'eager' : 'lazy'}">
    </div>
  `).join('');

  updateHeroContent(0);
}

function updateHeroContent(index) {
  const item = heroItems[index];
  if (!item) return;
  const title = item.title || 'Unknown';
  const year = (item.release_date || '').substring(0, 4);
  const rating = item.vote_average ? item.vote_average.toFixed(1) : 'N/A';
  const overview = item.overview || '';
  const genres = (item.genre_ids || []).slice(0, 3).map(id => movieGenreMap[id]).filter(Boolean).join(' • ');

  document.getElementById('heroContent').innerHTML = `
    <div class="hero-badge"><i class="fas fa-fire" style="font-size:11px;"></i> Trending Now</div>
    <h1 class="hero-title">${title}</h1>
    <div class="hero-meta">
      <div class="hero-meta-item rating"><i class="fas fa-star"></i> ${rating}</div>
      <div class="hero-meta-item">${year}</div>
      <div class="hero-meta-item">${genres}</div>
    </div>
    <p class="hero-overview">${overview}</p>
    <div class="hero-buttons">
      <button class="btn-future btn-play" onclick="openDetail(${item.id}, 'movie')"><i class="fas fa-play"></i> Watch Now</button>
      <button class="btn-future btn-trailer" onclick="event.stopPropagation(); openDetail(${item.id}, 'movie')"><i class="fas fa-info-circle"></i> Details</button>
    </div>
  `;
}

function startHeroAutoplay() {
  clearInterval(heroInterval);
  heroIndex = 0;
  heroTimer = setInterval(() => {
    nextHero();
  }, 6000);
  resetHeroProgress();
}

function resetHeroProgress() {
  const bar = document.getElementById('heroProgress');
  bar.style.animation = 'none';
  bar.offsetHeight;
  bar.style.animation = 'progressFill 6s linear forwards';
}

function goToHeroSlide(index) {
  heroIndex = index;
  document.querySelectorAll('.hero-slide-bg').forEach((s, i) => s.classList.toggle('active', i === index));
  updateHeroContent(index);
  resetHeroProgress();
}

function nextHero() {
  heroIndex = (heroIndex + 1) % heroItems.length;
  goToHeroSlide(heroIndex);
}

function prevHero() {
  heroIndex = (heroIndex - 1 + heroItems.length) % heroItems.length;
  goToHeroSlide(heroIndex);
}

// DETAIL MODAL
async function openDetail(id, type) {
  currentDetailItem = { id, type };
  const modal = document.getElementById('detailModal');
  modal.classList.add('show');
  document.body.style.overflow = 'hidden';

  document.getElementById('playerContainer').style.display = 'none';
  document.getElementById('playerIframe').src = '';
  document.getElementById('tvSelectors').style.display = 'none';

  try {
    const [detailRes, creditsRes, arDetailRes] = await Promise.all([
      fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=${EN_LANG}`),
      fetch(`${BASE_URL}/${type}/${id}/credits?api_key=${API_KEY}&language=${EN_LANG}`),
      fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=${AR_LANG}`)
    ]);

    const detail = await detailRes.json();
    const credits = await creditsRes.json();
    const arDetail = await arDetailRes.json();

    let arGenres = {};
    try {
      const genreRes = await fetch(`${BASE_URL}/genre/${type}/list?api_key=${API_KEY}&language=${AR_LANG}`);
      const genreData = await genreRes.json();
      genreData.genres.forEach(g => arGenres[g.id] = g.name);
    } catch(e) {}

    // Fetch videos
    let videos = { results: [] };
    try {
      const vidRes = await fetch(`${BASE_URL}/${type}/${id}/videos?api_key=${API_KEY}`);
      videos = await vidRes.json();
    } catch(e) {}

    detail.videos = videos;
    renderDetailModal(detail, credits, arDetail, arGenres, type);
  } catch (e) {
    console.error('Detail fetch error:', e);
    document.getElementById('modalDetails').innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:40px;">Failed to load details.</p>';
  }
}

function renderDetailModal(detail, credits, arDetail, arGenres, type) {
  const container = document.getElementById('modalDetails');
  const title = detail.title || detail.name;
  const year = (detail.release_date || detail.first_air_date || '').substring(0, 4);
  const rating = detail.vote_average ? detail.vote_average.toFixed(1) : 'N/A';
  const poster = detail.poster_path ? `${IMG_URL}${detail.poster_path}` : '';
  const runtime = detail.runtime ? `${Math.floor(detail.runtime/60)}h ${detail.runtime%60}m` : (detail.episode_run_time?.[0] ? `${detail.episode_run_time[0]}m per ep` : '');
  const genres = (detail.genres || []).map(g => arGenres[g.id] || g.name);
  const overview = arDetail.overview || detail.overview || 'No description available.';
  const cast = (credits.cast || []).slice(0, 12);

  const embedUrl = type === 'movie' 
    ? `https://vsembed.ru/embed/movie?tmdb=${detail.id}&ds_lang=ar`
    : `https://vsembed.ru/embed/tv?tmdb=${detail.id}&season=1&episode=1&ds_lang=ar`;

  if (type === 'tv') {
    document.getElementById('tvSelectors').style.display = 'flex';
    const seasonSelect = document.getElementById('seasonSelect');
    seasonSelect.innerHTML = '';
    (detail.seasons || []).filter(s => s.season_number > 0).forEach(s => {
      seasonSelect.innerHTML += `<option value="${s.season_number}">Season ${s.season_number}</option>`;
    });
    updateEpisodeSelect();
  } else {
    document.getElementById('tvSelectors').style.display = 'none';
  }

  const trailerKey = (detail.videos?.results || []).find(v => v.type === 'Trailer' && v.site === 'YouTube')?.key 
    || (detail.videos?.results || []).find(v => v.site === 'YouTube')?.key;

  container.innerHTML = `
    <div class="modal-top">
      <div class="modal-poster">
        ${poster ? `<img src="${poster}" alt="${title}">` : '<div class="no-image" style="width:100%;aspect-ratio:2/3;"><i class="fas fa-film"></i></div>'}
      </div>
      <div class="modal-info">
        <h2 class="modal-title">${title}</h2>
        <div class="modal-meta">
          <span class="rating"><i class="fas fa-star"></i> ${rating}/10</span>
          <span class="dot">•</span>
          <span>${year}</span>
          ${runtime ? `<span class="dot">•</span><span><i class="fas fa-clock" style="color:var(--neon-blue);margin-right:4px;"></i> ${runtime}</span>` : ''}
          <span class="dot">•</span>
          <span style="text-transform:uppercase;font-weight:600;color:var(--neon-blue);letter-spacing:1px;">${type === 'tv' ? 'TV Series' : 'Movie'}</span>
        </div>
        <div class="modal-genres">
          ${genres.map(g => `<span class="genre-tag">${g}</span>`).join('')}
        </div>
        <div class="modal-actions">
          <button class="btn-future btn-play" onclick="playMovie('${embedUrl}')"><i class="fas fa-play"></i> Watch Now</button>
          ${trailerKey ? `<button class="btn-future btn-trailer" onclick="playTrailer('${trailerKey}')"><i class="fas fa-film"></i> Trailer</button>` : ''}
        </div>
      </div>
    </div>
    <p class="modal-overview">${overview}</p>
    ${cast.length > 0 ? `
      <div class="cast-section">
        <h3 class="cast-title">Top Cast</h3>
        <div class="cast-scroll">
          ${cast.map(c => `
            <div class="cast-card">
              <div class="cast-avatar">
                ${c.profile_path ? `<img src="${IMG_URL}${c.profile_path}" alt="${c.name}">` : '<div class="no-avatar"><i class="fas fa-user"></i></div>'}
              </div>
              <div class="cast-name">${c.name}</div>
            </div>
          `).join('')}
        </div>
      </div>
    ` : ''}
  `;
}

function playMovie(url) {
  const player = document.getElementById('playerContainer');
  const iframe = document.getElementById('playerIframe');
  iframe.src = url;
  player.style.display = 'block';
  player.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function updateEpisodeSelect() {
  const season = document.getElementById('seasonSelect').value;
  const episodeSelect = document.getElementById('episodeSelect');
  episodeSelect.innerHTML = '';
  for (let i = 1; i <= 30; i++) {
    episodeSelect.innerHTML += `<option value="${i}">Episode ${i}</option>`;
  }
  loadEpisode();
}

function loadEpisode() {
  if (currentDetailItem && currentDetailItem.type === 'tv') {
    const season = document.getElementById('seasonSelect').value;
    const episode = document.getElementById('episodeSelect').value;
    const url = `https://vsembed.ru/embed/tv?tmdb=${currentDetailItem.id}&season=${season}&episode=${episode}&ds_lang=ar`;
    playMovie(url);
  }
}

function closeModal() {
  document.getElementById('detailModal').classList.remove('show');
  document.getElementById('playerIframe').src = '';
  document.body.style.overflow = '';
}

function playTrailer(key) {
  const overlay = document.getElementById('trailerOverlay');
  const iframe = document.getElementById('trailerIframe');
  iframe.src = `https://www.youtube.com/embed/${key}?autoplay=1`;
  overlay.classList.add('show');
}

function closeTrailer() {
  document.getElementById('trailerOverlay').classList.remove('show');
  document.getElementById('trailerIframe').src = '';
}

// SEARCH
function toggleSearch() {
  const box = document.getElementById('searchBox');
  box.classList.toggle('show');
  if (box.classList.contains('show')) {
    document.getElementById('searchInput').focus();
  }
}

function handleSearch(query) {
  clearTimeout(searchTimeout);
  if (!query.trim()) {
    document.getElementById('searchResults').innerHTML = '';
    return;
  }
  searchTimeout = setTimeout(() => performSearch(query), 400);
}

async function performSearch(query) {
  const resultsContainer = document.getElementById('searchResults');
  resultsContainer.innerHTML = '<div style="text-align:center;padding:30px;"><div class="spinner-ring" style="margin:0 auto;position:relative;"></div></div>';

  try {
    const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&language=${EN_LANG}&query=${encodeURIComponent(query)}&page=1`);
    const data = await res.json();
    const items = (data.results || []).filter(item => item.media_type === 'movie' || item.media_type === 'tv').slice(0, 8);

    if (items.length === 0) {
      resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px;">No results found.</p>';
      return;
    }

    resultsContainer.innerHTML = items.map(item => {
      const title = item.title || item.name || 'Unknown';
      const year = (item.release_date || item.first_air_date || '').substring(0, 4);
      const poster = item.poster_path ? `${IMG_URL}${item.poster_path}` : '';
      const type = item.media_type === 'tv' ? 'TV Show' : 'Movie';

      return `
        <div class="search-result-item" onclick="openDetail(${item.id}, '${item.media_type}'); toggleSearch();">
          ${poster ? `<img src="${poster}" alt="${title}">` : '<div style="width:55px;height:80px;background:var(--card-bg);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;"><i class="fas fa-film" style="color:var(--text-muted);"></i></div>'}
          <div class="search-result-info">
            <h4>${title}</h4>
            <span>${year} • ${type}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    resultsContainer.innerHTML = '<p style="text-align:center;color:var(--text-muted);padding:24px;font-size:13px;">Search failed.</p>';
  }
}

// MOBILE
function toggleMobileMenu() {
  document.getElementById('mobileNav').classList.toggle('show');
}

function goHome() {
  switchTab('home');
}

// Close modals
document.getElementById('detailModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

document.getElementById('trailerOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeTrailer();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeModal();
    closeTrailer();
    document.getElementById('searchBox').classList.remove('show');
  }
});
</script>
</body>
</html>
