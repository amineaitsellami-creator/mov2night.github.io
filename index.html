<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Movs2nighT | Premium Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base: #050505;
            --bg-elevated: #121212;
            --accent: #e50914; /* Cinematic Red */
            --accent-glow: rgba(229, 9, 20, 0.4);
            --text-primary: #ffffff;
            --text-secondary: #a1a1aa;
            --glass-bg: rgba(15, 15, 15, 0.6);
            --glass-border: rgba(255, 255, 255, 0.05);
            --transition-smooth: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
        }

        .en { font-family: 'Outfit', sans-serif; direction: ltr; display: inline-block; }

        /* Hide Scrollbar but keep functionality */
        ::-webkit-scrollbar { width: 0; height: 0; display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* App Container */
        #app {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        /* Views */
        .view {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            overflow-y: auto; overflow-x: hidden;
            background: var(--bg-base);
            transition: transform var(--transition-smooth), opacity var(--transition-smooth), filter var(--transition-smooth);
            will-change: transform, opacity, filter;
        }

        /* View States */
        .view.hidden-right { transform: translateX(100%); opacity: 0; pointer-events: none; }
        .view.hidden-left { transform: translateX(-100%); opacity: 0; pointer-events: none; }
        .view.hidden-scale { transform: scale(0.95); opacity: 0; pointer-events: none; }
        .view.active { transform: translateX(0) scale(1); opacity: 1; pointer-events: auto; }
        .view.background { transform: scale(0.95); opacity: 0.5; filter: blur(10px); pointer-events: none; }

        /* Floating Header */
        .header {
            position: fixed; top: 0; left: 0; width: 100%;
            padding: 20px 40px; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(5,5,5,0.9) 0%, rgba(5,5,5,0) 100%);
            transition: transform 0.3s ease;
        }
        .header.scrolled {
            background: var(--glass-bg);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }
        .brand {
            font-family: 'Outfit', sans-serif; font-size: 2rem; font-weight: 800;
            color: #fff; text-decoration: none; letter-spacing: -1px;
            display: flex; align-items: center; gap: 10px;
        }
        .brand span { color: var(--accent); }

        /* Search Pill */
        .search-pill {
            display: flex; align-items: center; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 999px;
            padding: 5px 20px; backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        .search-pill:focus-within {
            background: rgba(255,255,255,0.1); border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow); transform: scale(1.02);
        }
        .search-pill input {
            background: transparent; border: none; color: #fff;
            padding: 10px; width: 250px; outline: none;
            font-family: 'Tajawal', sans-serif; font-size: 1rem;
        }
        .search-pill input::placeholder { color: var(--text-secondary); }

        /* Hero Carousel */
        .hero-section {
            position: relative; width: 100%; height: 85vh;
            display: flex; align-items: flex-end; padding: 60px 40px;
        }
        .hero-bg {
            position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1;
            mask-image: linear-gradient(to top, var(--bg-base) 0%, transparent 100%);
            -webkit-mask-image: linear-gradient(to top, rgba(5,5,5,1) 5%, rgba(5,5,5,0) 100%);
            transition: opacity 1s ease;
        }
        .hero-content {
            max-width: 800px; z-index: 10;
            animation: fadeUp 1s ease forwards;
        }
        .hero-tag {
            display: inline-block; padding: 6px 16px; border-radius: 999px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); font-size: 0.9rem; font-weight: 600;
            margin-bottom: 20px; color: var(--accent);
        }
        .hero-title {
            font-size: 5rem; font-weight: 800; line-height: 1.1; margin-bottom: 20px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .hero-overview {
            font-size: 1.2rem; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 30px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }

        /* Buttons */
        .btn-play {
            background: var(--text-primary); color: var(--bg-base);
            border: none; padding: 16px 40px; border-radius: 999px;
            font-size: 1.1rem; font-weight: 700; cursor: pointer;
            display: inline-flex; align-items: center; gap: 10px;
            transition: all var(--transition-bounce);
        }
        .btn-play:hover {
            transform: scale(1.05); background: var(--accent); color: #fff;
            box-shadow: 0 10px 30px var(--accent-glow);
        }
        .btn-icon {
            width: 50px; height: 50px; border-radius: 50%;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: #fff; display: flex; align-items: center; justify-content: center;
            cursor: pointer; backdrop-filter: blur(10px); transition: all 0.3s ease;
        }
        .btn-icon:hover { background: #fff; color: #000; transform: scale(1.1); }

        /* Horizontal Rows */
        .row-container { margin-top: 20px; padding-bottom: 40px; }
        .row-header {
            padding: 0 40px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px;
        }
        .row-title { font-size: 1.8rem; font-weight: 700; }
        .row-indicator { width: 8px; height: 30px; background: var(--accent); border-radius: 4px; }
        
        .row {
            display: flex; gap: 20px; padding: 0 40px 40px;
            overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth;
        }
        .card {
            flex: 0 0 calc(100% / 6 - 20px); min-width: 200px;
            scroll-snap-align: start; position: relative;
            border-radius: 16px; overflow: hidden; cursor: pointer;
            transition: transform var(--transition-bounce), box-shadow var(--transition-smooth);
        }
        @media (max-width: 1200px) { .card { flex: 0 0 calc(100% / 4 - 20px); } }
        @media (max-width: 768px) { .card { flex: 0 0 calc(100% / 2 - 20px); } }
        
        .card-img {
            width: 100%; aspect-ratio: 2/3; object-fit: cover;
            transition: transform var(--transition-smooth);
        }
        .card-overlay {
            position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 50%);
            opacity: 0; transition: opacity var(--transition-smooth);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 20px;
        }
        .card:hover { transform: translateY(-10px) scale(1.05); box-shadow: 0 20px 40px rgba(0,0,0,0.5); z-index: 10; }
        .card:hover .card-img { transform: scale(1.05); }
        .card:hover .card-overlay { opacity: 1; }
        
        .card-title { font-size: 1.1rem; font-weight: 700; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-meta { font-size: 0.9rem; color: var(--accent); font-weight: 600; }

        /* Details View */
        #details { background: var(--bg-base); z-index: 50; }
        .details-hero { position: relative; width: 100%; height: 70vh; }
        .details-bg { width: 100%; height: 100%; object-fit: cover; opacity: 0.4; mask-image: linear-gradient(to top, transparent, black 80%); -webkit-mask-image: linear-gradient(to top, transparent, black 80%); }
        .details-content {
            position: relative; max-width: 1200px; margin: -20vh auto 0; padding: 0 40px 100px;
            display: flex; gap: 60px; z-index: 10;
        }
        .details-poster-wrapper { flex: 0 0 350px; }
        .details-poster {
            width: 100%; border-radius: 24px; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            border: 1px solid var(--glass-border);
            transform: translateY(0); transition: transform var(--transition-bounce);
        }
        .details-poster:hover { transform: translateY(-10px); }
        .details-info { flex: 1; padding-top: 40px; }
        .details-title { font-size: 4.5rem; font-weight: 900; line-height: 1; margin-bottom: 20px; }
        .details-meta-bar {
            display: flex; gap: 20px; align-items: center; margin-bottom: 40px;
            font-size: 1.2rem; color: var(--text-secondary);
        }
        .rating-badge {
            background: rgba(255, 215, 0, 0.1); color: #ffd700;
            padding: 5px 15px; border-radius: 999px; border: 1px solid rgba(255, 215, 0, 0.2);
            font-weight: 700;
        }
        .genres-wrap { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 30px; }
        .genre-pill {
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            padding: 8px 20px; border-radius: 999px; font-size: 1rem;
        }
        .details-story {
            font-size: 1.3rem; line-height: 1.8; color: #ddd; margin-bottom: 40px;
            background: linear-gradient(to right, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Player View */
        #player { background: #000; z-index: 100; display: flex; flex-direction: column; }
        .player-nav {
            position: absolute; top: 0; left: 0; width: 100%; padding: 20px 40px;
            display: flex; justify-content: space-between; align-items: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent);
            z-index: 110; opacity: 0; transition: opacity 0.3s ease;
        }
        #player:hover .player-nav { opacity: 1; }
        .player-title { font-size: 1.5rem; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        
        .player-container { flex: 1; display: flex; width: 100%; height: 100%; position: relative; }
        .iframe-box { flex: 1; height: 100%; background: #000; }
        .iframe-box iframe { width: 100%; height: 100%; border: none; }
        
        /* TV Sidebar - Glassmorphism Overlay style */
        .tv-panel {
            width: 400px; background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-right: 1px solid var(--glass-border);
            display: flex; flex-direction: column;
            transform: translateX(0); transition: transform var(--transition-smooth);
        }
        .tv-panel.collapsed { transform: translateX(100%); position: absolute; right: 0; height: 100%; }
        
        .season-header { padding: 30px; border-bottom: 1px solid var(--glass-border); }
        .season-select {
            width: 100%; padding: 15px 20px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 16px;
            color: #fff; font-size: 1.2rem; font-family: 'Outfit', sans-serif;
            outline: none; cursor: pointer; appearance: none;
        }
        .season-select option { background: #121212; }
        
        .episodes-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .ep-card {
            display: flex; align-items: center; gap: 20px; padding: 15px;
            border-radius: 16px; cursor: pointer; border: 1px solid transparent;
            transition: all 0.2s ease; background: transparent; color: var(--text-secondary);
            text-align: left;
        }
        .ep-card:hover { background: rgba(255,255,255,0.05); color: #fff; }
        .ep-card.active {
            background: rgba(229, 9, 20, 0.1); border-color: rgba(229, 9, 20, 0.3);
            color: #fff;
        }
        .ep-num { font-size: 2rem; font-weight: 800; opacity: 0.3; font-family: 'Outfit', sans-serif; }
        .ep-card.active .ep-num { opacity: 1; color: var(--accent); }
        .ep-name { font-size: 1.1rem; font-weight: 500; font-family: 'Outfit', sans-serif; }

        /* Loader */
        .loader-overlay {
            position: fixed; inset: 0; background: var(--bg-base); z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 60px; height: 60px; border: 4px solid rgba(255,255,255,0.1);
            border-left-color: var(--accent); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* Responsive */
        @media (max-width: 900px) {
            .header { padding: 15px 20px; }
            .search-pill input { width: 150px; }
            .search-pill:focus-within input { width: 200px; }
            .hero-title { font-size: 3rem; }
            .details-content { flex-direction: column; margin-top: -10vh; padding: 0 20px 50px; gap: 30px; }
            .details-poster-wrapper { flex: auto; max-width: 250px; margin: 0 auto; }
            .details-title { font-size: 2.5rem; text-align: center; }
            .details-meta-bar { justify-content: center; flex-wrap: wrap; }
            .tv-panel { position: absolute; right: 0; height: 100%; width: 300px; z-index: 120; }
        }
    </style>
</head>
<body>

    <!-- Global Loader -->
    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
    </div>

    <div id="app">
        
        <!-- HOME VIEW -->
        <div id="home" class="view active">
            <header class="header" id="main-header">
                <a href="#" class="brand" onclick="navigateTo('home')">Movs<span>2</span>nighT</a>
                <div class="search-pill">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: #a1a1aa;"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    <input type="text" id="searchInput" class="en" placeholder="Search movies, shows..." onkeypress="handleSearch(event)">
                </div>
            </header>

            <div id="hero-container"></div>

            <div class="row-container">
                <div class="row-header">
                    <div class="row-indicator"></div>
                    <h2 class="row-title en">Trending Movies</h2>
                </div>
                <div class="row" id="movies-row"></div>
            </div>

            <div class="row-container">
                <div class="row-header">
                    <div class="row-indicator"></div>
                    <h2 class="row-title en">Trending TV Shows</h2>
                </div>
                <div class="row" id="shows-row"></div>
            </div>
        </div>

        <!-- DETAILS VIEW -->
        <div id="details" class="view hidden-right">
            <div class="header">
                <button class="btn-icon" onclick="navigateBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
            </div>
            
            <div class="details-hero">
                <img id="det-backdrop" class="details-bg" src="" alt="">
            </div>
            
            <div class="details-content">
                <div class="details-poster-wrapper">
                    <img id="det-poster" class="details-poster" src="" alt="">
                </div>
                <div class="details-info">
                    <h1 id="det-title" class="details-title en"></h1>
                    <div class="details-meta-bar en">
                        <span id="det-year"></span>
                        <span>•</span>
                        <span id="det-type" style="text-transform: uppercase; letter-spacing: 2px; color: var(--accent);"></span>
                        <span>•</span>
                        <span class="rating-badge" id="det-rating"></span>
                    </div>
                    <div class="genres-wrap" id="det-genres"></div>
                    <p id="det-story" class="details-story"></p>
                    
                    <button class="btn-play" onclick="openPlayer()">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                        <span class="en">Play Now</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- PLAYER VIEW -->
        <div id="player" class="view hidden-scale">
            <div class="player-nav">
                <button class="btn-icon" onclick="navigateBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </button>
                <span id="player-title" class="player-title en"></span>
                <button class="btn-icon" id="toggle-sidebar-btn" onclick="toggleSidebar()" style="display:none;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                </button>
            </div>
            
            <div class="player-container">
                <div class="iframe-box">
                    <iframe id="video-frame" src="" allowfullscreen></iframe>
                </div>
                
                <div id="tv-sidebar" class="tv-panel hidden">
                    <div class="season-header">
                        <select id="season-select" class="season-select en" onchange="changeSeason(this.value)"></select>
                    </div>
                    <div id="episodes-list" class="episodes-scroll"></div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const API_KEY = 'c4bf0cb03e29e3fe72e44c3f2135b55a';
        const BASE_URL = 'https://api.themoviedb.org/3';
        
        // State Management
        let state = {
            currentMedia: null,
            season: 1,
            episode: 1,
            history: ['home'] // Stack: 'home', 'details', 'player'
        };

        // Navigation Engine
        function navigateTo(targetView) {
            const views = {
                home: document.getElementById('home'),
                details: document.getElementById('details'),
                player: document.getElementById('player')
            };

            // Reset all classes
            Object.values(views).forEach(v => v.className = 'view');

            if (targetView === 'home') {
                views.home.classList.add('active');
                views.details.classList.add('hidden-right');
                views.player.classList.add('hidden-scale');
                state.history = ['home'];
                document.getElementById('video-frame').src = ''; // Stop video
            } 
            else if (targetView === 'details') {
                views.home.classList.add('background');
                views.details.classList.add('active');
                views.player.classList.add('hidden-scale');
                if(state.history[state.history.length-1] !== 'details') state.history.push('details');
                document.getElementById('video-frame').src = ''; // Stop video
            }
            else if (targetView === 'player') {
                views.home.classList.add('hidden-left');
                views.details.classList.add('background');
                views.player.classList.add('active');
                if(state.history[state.history.length-1] !== 'player') state.history.push('player');
            }
        }

        function navigateBack() {
            if (state.history.length > 1) {
                state.history.pop();
                const prev = state.history[state.history.length - 1];
                navigateTo(prev);
            }
        }

        // Header Scroll Effect
        document.getElementById('home').addEventListener('scroll', (e) => {
            const header = document.getElementById('main-header');
            if (e.target.scrollTop > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });

        // API & Rendering
        async function fetchTrending(type) {
            const res = await fetch(`${BASE_URL}/trending/${type}/week?api_key=${API_KEY}`);
            const data = await res.json();
            return data.results;
        }

        function createCardHTML(item, type) {
            const title = item.title || item.name || item.original_title || item.original_name;
            const year = (item.release_date || item.first_air_date || '').split('-')[0];
            const poster = item.poster_path ? `https://image.tmdb.org/t/p/w500${item.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
            
            return `
                <div class="card" onclick="loadDetails(${item.id}, '${type}')">
                    <img src="${poster}" class="card-img" alt="${title}" loading="lazy">
                    <div class="card-overlay">
                        <div class="card-title en">${title}</div>
                        <div class="card-meta en">${year} • ⭐ ${item.vote_average.toFixed(1)}</div>
                    </div>
                </div>
            `;
        }

        function renderHero(item, type) {
            const title = item.title || item.name || item.original_title || item.original_name;
            const backdrop = item.backdrop_path ? `https://image.tmdb.org/t/p/original${item.backdrop_path}` : '';
            const overview = item.overview || '';

            return `
                <section class="hero-section">
                    <img src="${backdrop}" class="hero-bg" alt="Hero">
                    <div class="hero-content">
                        <div class="hero-tag en">#1 Trending ${type === 'tv' ? 'Show' : 'Movie'}</div>
                        <h1 class="hero-title en">${title}</h1>
                        <p class="hero-overview en">${overview}</p>
                        <button class="btn-play" onclick="loadDetails(${item.id}, '${type}')">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <span class="en">Watch Now</span>
                        </button>
                    </div>
                </section>
            `;
        }

        async function initApp() {
            try {
                const [movies, shows] = await Promise.all([fetchTrending('movie'), fetchTrending('tv')]);
                
                if(movies.length > 0) {
                    document.getElementById('hero-container').innerHTML = renderHero(movies[0], 'movie');
                }

                document.getElementById('movies-row').innerHTML = movies.slice(1).map(m => createCardHTML(m, 'movie')).join('');
                document.getElementById('shows-row').innerHTML = shows.map(s => createCardHTML(s, 'tv')).join('');
            } catch (error) {
                console.error("Initialization Error:", error);
            } finally {
                hideLoader();
            }
        }

        async function handleSearch(e) {
            if (e.key === 'Enter') {
                const query = e.target.value;
                if (!query) {
                    document.getElementById('hero-container').style.display = 'block';
                    return initApp();
                }
                
                showLoader();
                const res = await fetch(`${BASE_URL}/search/multi?api_key=${API_KEY}&query=${encodeURIComponent(query)}`);
                const data = await res.json();
                const results = data.results.filter(i => i.media_type === 'movie' || i.media_type === 'tv');
                
                document.getElementById('hero-container').style.display = 'none';
                document.getElementById('home').innerHTML = `
                    <header class="header scrolled" id="main-header">
                        <a href="#" class="brand" onclick="navigateTo('home'); setTimeout(initApp, 500);">Movs<span>2</span>nighT</a>
                        <div class="search-pill">
                            <input type="text" id="searchInput" class="en" placeholder="Search..." onkeypress="handleSearch(event)" value="${query}">
                        </div>
                    </header>
                    <div class="row-container" style="padding-top: 120px;">
                        <div class="row-header">
                            <div class="row-indicator"></div>
                            <h2 class="row-title en">Search Results</h2>
                        </div>
                        <div class="row" style="flex-wrap: wrap; justify-content: center;">
                            ${results.map(r => createCardHTML(r, r.media_type)).join('')}
                        </div>
                    </div>
                `;
                navigateTo('home');
                hideLoader();
            }
        }

        async function loadDetails(id, type) {
            showLoader();
            try {
                const [enRes, arRes] = await Promise.all([
                    fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=en-US`),
                    fetch(`${BASE_URL}/${type}/${id}?api_key=${API_KEY}&language=ar-SA`)
                ]);
                
                const en = await enRes.json();
                const ar = await arRes.json();
                
                state.currentMedia = { ...en, type };
                
                const title = en.title || en.name || en.original_title || en.original_name;
                const year = (en.release_date || en.first_air_date || '').split('-')[0];
                const story = ar.overview || en.overview || 'لا توجد قصة متاحة.';
                const genres = (ar.genres && ar.genres.length > 0) ? ar.genres : en.genres;
                
                document.getElementById('det-backdrop').src = en.backdrop_path ? `https://image.tmdb.org/t/p/original${en.backdrop_path}` : '';
                document.getElementById('det-poster').src = en.poster_path ? `https://image.tmdb.org/t/p/w500${en.poster_path}` : 'https://via.placeholder.com/500x750?text=No+Image';
                document.getElementById('det-title').innerText = title;
                document.getElementById('det-year').innerText = year;
                document.getElementById('det-type').innerText = type;
                document.getElementById('det-rating').innerText = `⭐ ${en.vote_average.toFixed(1)}`;
                document.getElementById('det-story').innerText = story;
                document.getElementById('det-genres').innerHTML = genres.map(g => `<span class="genre-pill">${g.name}</span>`).join('');
                
                navigateTo('details');
            } catch (error) {
                console.error("Details Error:", error);
            } finally {
                hideLoader();
            }
        }

        function openPlayer() {
            if (!state.currentMedia) return;
            
            const title = state.currentMedia.title || state.currentMedia.name;
            document.getElementById('player-title').innerText = title;
            
            const tvSidebar = document.getElementById('tv-sidebar');
            const toggleBtn = document.getElementById('toggle-sidebar-btn');
            
            if (state.currentMedia.type === 'movie') {
                tvSidebar.style.display = 'none';
                toggleBtn.style.display = 'none';
                document.getElementById('video-frame').src = `https://vsembed.ru/embed/movie?tmdb=${state.currentMedia.id}&ds_lang=ar`;
            } else {
                tvSidebar.style.display = 'flex';
                tvSidebar.classList.remove('collapsed');
                toggleBtn.style.display = 'flex';
                
                const seasons = state.currentMedia.seasons.filter(s => s.season_number > 0);
                document.getElementById('season-select').innerHTML = seasons.map(s => 
                    `<option value="${s.season_number}">Season ${s.season_number}</option>`
                ).join('');
                
                changeSeason(seasons[0].season_number);
            }
            
            navigateTo('player');
        }

        function toggleSidebar() {
            document.getElementById('tv-sidebar').classList.toggle('collapsed');
        }

        async function changeSeason(seasonNum) {
            state.season = seasonNum;
            const res = await fetch(`${BASE_URL}/tv/${state.currentMedia.id}/season/${seasonNum}?api_key=${API_KEY}&language=en-US`);
            const data = await res.json();
            
            document.getElementById('episodes-list').innerHTML = data.episodes.map(ep => `
                <button class="ep-card ${ep.episode_number === 1 ? 'active' : ''}" onclick="changeEpisode(${ep.episode_number}, this)">
                    <span class="ep-num">${ep.episode_number}</span>
                    <span class="ep-name">${ep.name}</span>
                </button>
            `).join('');
            
            changeEpisode(1, document.querySelector('.ep-card'));
        }

        function changeEpisode(epNum, btnElement) {
            state.episode = epNum;
            
            document.querySelectorAll('.ep-card').forEach(btn => btn.classList.remove('active'));
            if (btnElement) btnElement.classList.add('active');
            
            document.getElementById('video-frame').src = `https://vsembed.ru/embed/tv?tmdb=${state.currentMedia.id}&season=${state.season}&episode=${state.episode}&ds_lang=ar`;
            
            const title = state.currentMedia.title || state.currentMedia.name;
            document.getElementById('player-title').innerText = `${title} - S${state.season} E${state.episode}`;
        }

        // Utils
        function showLoader() { document.getElementById('loader').style.opacity = '1'; document.getElementById('loader').style.pointerEvents = 'auto'; }
        function hideLoader() { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.pointerEvents = 'none', 500); }

        // Start
        initApp();
    </script>
</body>
</html>
